    const factions = ProvinceManager.getFactions();
    const f = factions[factionId];
    const id = nextCharId++;
    const traitPool = Object.keys(TRAIT_DEFS);
    const traits = [traitPool[Math.floor(Math.random() * traitPool.length)]];
    return {
      id, name: `${parent.dynasty} 세자`, faction: factionId, role: 'heir',
      age: Math.floor(Math.random() * 10) + 10, dynasty: parent.dynasty,
      traits, stats: {
        martial:    Math.floor(Math.random()*8)+5,
        diplomacy:  Math.floor(Math.random()*8)+5,
        stewardship:Math.floor(Math.random()*8)+5,
        intrigue:   Math.floor(Math.random()*6)+3,
      }, married_to: null,
    };
  }

  function generateRuler(factionId) {
    const id = nextCharId++;
    const factions = ProvinceManager.getFactions();
    const f = factions[factionId];
    return {
      id, name: `신군주`, faction: factionId, role: 'ruler',
      age: 30 + Math.floor(Math.random()*15),
      dynasty: '신왕조',
      traits: ['현명한'],
      stats: { martial:8, diplomacy:8, stewardship:8, intrigue:5 },
      married_to: null,
    };
  }

  // ── 혼인 ──
  function marry(charId1, charId2) {
    const c1 = getById(charId1), c2 = getById(charId2);
    if (!c1 || !c2) return false;
    if (c1.faction !== c2.faction) {
      FactionManager.modRelation(c1.faction, c2.faction, 15);
      Notifications.push(`💒 ${c1.name} ↔ ${c2.name} 혼인 동맹`, 'good');
    }
    c1.married_to = charId2;
    c2.married_to = charId1;
    return true;
  }

  return {
    getAll, getById, getByFaction, getRuler, getHeir,
    getTrait, getAllTraits, getEffectiveStats,
    onYearTick, marry,
  };
})();


/* ════════════════════════════════════════════════════════
   M06 — MILITARY MANAGER
   병력/사단 시스템, 주둔군, 사단 이동, AI 행동
════════════════════════════════════════════════════════ */
const MilitaryManager = (() => {
  "use strict";

  // ── 게임 밸런스 상수 ──
  const MARTIAL_BONUS_PER_POINT = 0.05; // 무력 1당 전투력 보정 (+5%)

  // ── 병종 정의 ──
  const UNIT_TYPES = {
    infantry: { name:'보병',   power:1.0, cost:50,  upkeep:3  },
    cavalry:  { name:'기병',   power:2.0, cost:120, upkeep:8  },
    archers:  { name:'궁수',   power:0.8, cost:40,  upkeep:2  },
    siege:    { name:'공성대', power:0.3, cost:200, upkeep:10 },
  };

  // ── 세력별 초기 병력 풀 ──
  const INITIAL_GARRISON = {
    '고려':    { infantry:800, cavalry:300, archers:400, siege:50 },
    '북방부족':{ infantry:400, cavalry:800, archers:200, siege:10 },
    '서방상인':{ infantry:500, cavalry:200, archers:600, siege:30 },
    '동방호족':{ infantry:600, cavalry:400, archers:300, siege:20 },
    '남방':    { infantry:600, cavalry:300, archers:350, siege:25 },
  };

  // ── 프로빈스 인접 관계 ──
  const ADJACENCY = {
    1:  [2, 4, 5],
    2:  [1, 3, 6, 9],
    3:  [2, 8, 10],
    4:  [1, 5, 7],
    5:  [1, 4, 6, 7],
    6:  [2, 5, 7, 9, 11],
    7:  [4, 5, 6, 11, 12],
    8:  [3, 9, 10, 16],
    9:  [2, 6, 8, 11, 18],
    10: [3, 8, 16],
    11: [6, 7, 9, 12, 13, 17, 18],
    12: [7, 11, 13],
    13: [11, 12, 14, 17],
    14: [13, 15, 17],
    15: [14],
    16: [8, 10, 18],
    17: [11, 13, 14, 18],
    18: [9, 11, 16, 17],
  };

  // ── 내부 상태 ──
  let _garrisonData = {};
  // divisions: Array<{ id, factionId, units, locationId, targetId, travelDaysLeft, state }>
  let _divisions = [];
  let _nextDivId = 1;
  let _tickCount = 0;

  // ── 초기화 ──

  /** 세력별 초기 주둔군 배치 */
  function initGarrison() {
    ProvinceManager.getAll().forEach(p => {
      if (p.faction === '미지') return;
      const base = INITIAL_GARRISON[p.faction];
      if (!base) return;
      const fDef = ProvinceManager.getFaction(p.faction);
      const isCapital = fDef && fDef.capital === p.id;
      const scale = isCapital ? 1.0 : 0.3;
      _garrisonData[p.id] = {
        factionId: p.faction,
        infantry: Math.round(base.infantry * scale),
        cavalry:  Math.round(base.cavalry  * scale),
        archers:  Math.round(base.archers  * scale),
        siege:    Math.round(base.siege    * scale),
      };
    });
  }

  /** AI 초기 사단 생성 (세력별 수도에 1개씩) */
  function initAIDivisions() {
    const fDefs = ProvinceManager.getFactions();
    Object.values(fDefs).forEach(f => {
      if (f.id === '미지' || !f.capital) return;
      const base = INITIAL_GARRISON[f.id];
      if (!base) return;
      createDivision(f.id, f.capital, {
        infantry: Math.round(base.infantry * 0.5),
        cavalry:  Math.round(base.cavalry  * 0.5),
        archers:  Math.round(base.archers  * 0.5),
        siege:    Math.round(base.siege    * 0.5),
      });
    });
  }

  // ── 사단 생성/조회 ──

  /** @returns {number} divisionId */
  function createDivision(factionId, provinceId, units) {
    const id = _nextDivId++;
    _divisions.push({
      id, factionId,
      units: { infantry:0, cavalry:0, archers:0, siege:0, ...units },
      locationId: provinceId,
      targetId: null,
      travelDaysLeft: 0,
      state: 'idle',
    });
    return id;
  }

  /** @returns {boolean} */
  function moveDivision(divisionId, targetProvinceId) {
    const div = _divisions.find(d => d.id === divisionId);
    if (!div || div.state !== 'idle') return false;
    const isAdj = (ADJACENCY[div.locationId] || []).includes(targetProvinceId);
    div.targetId = targetProvinceId;
    div.travelDaysLeft = isAdj ? 3 : 5;
    div.state = 'moving';
    return true;
  }

  /** @returns {object|null} */
  function getDivisionById(divId) {
    return _divisions.find(d => d.id === divId) || null;
  }

  /** @returns {Array} */
  function getDivisionsAt(provinceId) {
    return _divisions.filter(d => d.locationId === provinceId);
  }

  /** @returns {Array} */
  function getDivisionsByFaction(factionId) {
    return _divisions.filter(d => d.factionId === factionId);
  }

  /** @returns {object|null} */
  function getGarrison(provinceId) {
    return _garrisonData[provinceId] || null;
  }

  /** @returns {number} */
  function getGarrisonPower(provinceId) {
    const g = _garrisonData[provinceId];
    if (!g) return 0;
    return calcDivisionPower(g, g.factionId, provinceId);
  }

  // ── 전투력 계산 ──
  function calcDivisionPower(units, factionId, provinceId) {
    let power = 0;
    Object.entries(UNIT_TYPES).forEach(([type, ut]) => {
      power += (units[type] || 0) * ut.power;
    });
    const ruler = CharacterManager.getRuler(factionId);
    if (ruler) {
      const stats = CharacterManager.getEffectiveStats(ruler);
      power *= (1 + (stats.martial || 0) * MARTIAL_BONUS_PER_POINT);
    }
    return Math.max(1, power);
  }

  // ── 전투 체크 ──
  function _checkBattleAtProvince(provinceId) {
    const idleDivs = _divisions.filter(d => d.locationId === provinceId && d.state === 'idle');
    if (idleDivs.length === 0) return;

    // Division vs garrison
    const g = _garrisonData[provinceId];
    if (g && g.factionId !== '미지') {
      for (const div of idleDivs) {
        if (div.factionId !== g.factionId) {
          div.state = 'fighting';
          GameCore.emit('battleStart', {
            attackerDivId: div.id,
            defenderInfo: { type: 'garrison', id: provinceId },
            provinceId,
          });
          return;
        }
      }
    }

    // Division vs division
    if (idleDivs.length >= 2) {
      for (let i = 0; i < idleDivs.length; i++) {
        for (let j = i + 1; j < idleDivs.length; j++) {
          const d1 = idleDivs[i], d2 = idleDivs[j];
          if (d1.factionId !== d2.factionId && d1.state === 'idle' && d2.state === 'idle') {
            d1.state = 'fighting';
            d2.state = 'fighting';
            GameCore.emit('battleStart', {
              attackerDivId: d1.id,
              defenderInfo: { type: 'division', id: d2.id },
              provinceId,
            });
            return;
          }
        }
      }
    }
  }

  // ── 틱 처리 ──
  function onTick() {
    _tickCount++;
    // 이동 처리
    _divisions.forEach(div => {
      if (div.state === 'moving') {
        div.travelDaysLeft--;
        if (div.travelDaysLeft <= 0) {
          div.locationId = div.targetId;
          div.targetId = null;
          div.state = 'idle';
          GameCore.emit('divisionArrived', { divisionId: div.id, provinceId: div.locationId });
          _checkBattleAtProvince(div.locationId);
        }
      }
    });
    // AI 틱 (30일마다)
    if (_tickCount % 30 === 0) _aiTick();
  }

  // ── AI 행동 ──
  function _aiTick() {
    Object.keys(INITIAL_GARRISON).forEach(fid => {
      const fDivs = getDivisionsByFaction(fid);
      const idleDivs = fDivs.filter(d => d.state === 'idle');
      if (idleDivs.length === 0) {
        _aiCreateDivision(fid);
        return;
      }
      idleDivs.forEach(div => {
        const target = _findAttackTarget(fid, div.locationId);
        if (target !== null) moveDivision(div.id, target);
      });
    });
  }

  function _findAttackTarget(fid, fromId) {
    // 즉시 인접 적 탐색
    const adjIds = ADJACENCY[fromId] || [];
    for (const adjId of adjIds) {
      const p = ProvinceManager.getById(adjId);
      if (!p || p.faction === fid || p.faction === '미지') continue;
      const rel = FactionManager.getRelation(fid, p.faction);
      if (rel < 0) return adjId;
    }
    // BFS로 자기 영토 통과해 적 접경 찾기
    const visited = new Set([fromId]);
    const queue = [[fromId, null]];
    while (queue.length > 0) {
      const [curr, firstStep] = queue.shift();
      for (const adjId of (ADJACENCY[curr] || [])) {
        if (visited.has(adjId)) continue;
        visited.add(adjId);
        const p = ProvinceManager.getById(adjId);
        if (!p) continue;
        const step = firstStep !== null ? firstStep : adjId;
        if (p.faction !== fid && p.faction !== '미지') {
          const rel = FactionManager.getRelation(fid, p.faction);
          if (rel < 0) return step;
        } else if (p.faction === fid) {
          queue.push([adjId, step]);
        }
      }
    }
    return null;
  }

  function _aiCreateDivision(fid) {
    const fDef = ProvinceManager.getFaction(fid);
    if (!fDef || !fDef.capital) return;
    const fs = FactionManager.getAllFactionStates()[fid];
    if (!fs || fs.gold < 300) return;
    const base = INITIAL_GARRISON[fid];
    if (!base) return;
    if (Math.random() < 0.3) {
      createDivision(fid, fDef.capital, {
        infantry: Math.round(base.infantry * 0.3),
        cavalry:  Math.round(base.cavalry  * 0.3),
        archers:  Math.round(base.archers  * 0.3),
        siege:    0,
      });
      fs.gold = Math.round(fs.gold - 200);
    }
  }

  // ── 월 유지비 ──
  function onMonthUpkeep() {
    const states = FactionManager.getAllFactionStates();
    Object.keys(INITIAL_GARRISON).forEach(fid => {
      const fDivs = getDivisionsByFaction(fid);
      let upkeep = 0;
      fDivs.forEach(div => {
        Object.entries(UNIT_TYPES).forEach(([type, ut]) => {
          upkeep += Math.ceil((div.units[type] || 0) * ut.upkeep / 100);
        });
      });
      if (states[fid]) states[fid].gold = Math.round(states[fid].gold - upkeep);
    });
  }

  // ── 사단 상태 변경 (전투 엔진에서 사용) ──
  function setDivisionState(divId, state) {
    const div = _divisions.find(d => d.id === divId);
    if (div) div.state = state;
  }

  function updateDivision(divId, newUnits) {
    const div = _divisions.find(d => d.id === divId);
    if (div) div.units = { ...newUnits };
  }

  function disbandDivision(divId) {
    _divisions = _divisions.filter(d => d.id !== divId);
  }

  function retreatDivision(divId, fromProvinceId) {
    const div = _divisions.find(d => d.id === divId);
    if (!div) return;
    const adj = ADJACENCY[fromProvinceId] || [];
    const friendlyAdj = adj.filter(id => {
      const p = ProvinceManager.getById(id);
      return p && p.faction === div.factionId;
    });
    if (friendlyAdj.length > 0) {
      div.locationId = friendlyAdj[0];
      div.state = 'idle';
    } else {
      disbandDivision(divId);
    }
  }

  function updateGarrisonOwner(provinceId, newFactionId) {
    const g = _garrisonData[provinceId];
    if (g) {
      g.factionId = newFactionId;
      g.infantry  = Math.round(g.infantry * 0.2);
      g.cavalry   = Math.round(g.cavalry  * 0.2);
      g.archers   = Math.round(g.archers  * 0.2);
      g.siege     = Math.round(g.siege    * 0.2);
    } else {
      const base = INITIAL_GARRISON[newFactionId];
      if (base) {
        _garrisonData[provinceId] = {
          factionId: newFactionId,
          infantry: Math.round(base.infantry * 0.1),
          cavalry:  0,
          archers:  Math.round(base.archers  * 0.1),
          siege:    0,
        };
      }
    }
  }

  function updateGarrisonCasualties(provinceId, casualties) {
    const g = _garrisonData[provinceId];
    if (!g) return;
    Object.entries(casualties).forEach(([type, loss]) => {
      if (g[type] !== undefined) g[type] = Math.max(0, g[type] - (loss || 0));
    });
  }

  return {
    initGarrison, initAIDivisions,
    createDivision, moveDivision,
    getDivisionById, getDivisionsAt, getDivisionsByFaction,
    getAllDivisions: () => _divisions,
    getGarrison, getGarrisonPower, calcDivisionPower,
    onTick, onMonthUpkeep,
    setDivisionState, updateDivision, disbandDivision,
    retreatDivision, updateGarrisonOwner, updateGarrisonCasualties,
    getUnitTypes: () => UNIT_TYPES,
    getAdjacency: () => ADJACENCY,
    getMartialBonus: () => MARTIAL_BONUS_PER_POINT,
  };
})();


/* ════════════════════════════════════════════════════════
   M07 — COMBAT ENGINE
   전투력 계산, 승패 판정, 손실 처리, 점령
════════════════════════════════════════════════════════ */
const CombatEngine = (() => {
  "use strict";

  // ── 게임 밸런스 상수 ──
  const ATTACKER_CASUALTY_RATE = 0.25; // 공격자 손실 비율
  const DEFENDER_CASUALTY_RATE = 0.30; // 수비자 손실 비율
  const MIN_DIVISION_SIZE      = 50;   // 사단 해산 임계 병력
  const COMBAT_VARIANCE_MIN    = 0.93; // 전투 랜덤 분산 하한 (±7%)
  const COMBAT_VARIANCE_RANGE  = 0.14; // 전투 랜덤 분산 범위

  let _totalBattles = 0;

  // ── 전투력 계산 ──
  /** @param {boolean} isDefender 수비측은 지형 보정 적용 */
  function calcCombatPower(units, factionId, provinceId, isDefender) {
    const UNIT_TYPES = MilitaryManager.getUnitTypes();
    let power = 0;
    Object.entries(UNIT_TYPES).forEach(([type, ut]) => {
      power += (units[type] || 0) * ut.power;
    });
    // 지형 방어 보정 (수비측만)
    if (isDefender) {
      const prov = ProvinceManager.getById(provinceId);
      if (prov) {
        const terrain = ProvinceManager.getTerrain(prov.terrain);
        if (terrain) power *= terrain.defMod;
      }
    }
    // 지휘관 무력 보정
    const ruler = CharacterManager.getRuler(factionId);
    if (ruler) {
      const stats = CharacterManager.getEffectiveStats(ruler);
      power *= (1 + (stats.martial || 0) * MilitaryManager.getMartialBonus());
    }
    return Math.max(1, power);
  }

  // ── 손실 계산 ──
  function _calcCasualties(atkPower, defPower, atkUnits, defUnits) {
    const atkTotal = Object.values(atkUnits).reduce((s, v) => s + v, 0);
    const defTotal = Object.values(defUnits).reduce((s, v) => s + v, 0);
    const ratio = atkPower / (atkPower + defPower);
    return {
      attackerLoss: Math.round(atkTotal * (1 - ratio) * ATTACKER_CASUALTY_RATE),
      defenderLoss: Math.round(defTotal * ratio       * DEFENDER_CASUALTY_RATE),
    };
  }

  function _applyUnitCasualties(units, totalLoss) {
    const total = Object.values(units).reduce((s, v) => s + v, 0);
    if (total === 0) return { ...units };
    const ratio = Math.min(totalLoss / total, 1);
    const result = {};
    Object.entries(units).forEach(([type, count]) => {
      result[type] = Math.max(0, Math.round(count * (1 - ratio)));
    });
    return result;
  }

  // ── 점령 처리 ──
  function occupyProvince(provinceId, newFactionId) {
    const prov = ProvinceManager.getById(provinceId);
    if (!prov) return;
    const oldFaction = prov.faction;
    if (oldFaction === newFactionId) return;
    prov.faction = newFactionId;
    MilitaryManager.updateGarrisonOwner(provinceId, newFactionId);
    Notifications.push(`\uD83C\uDFF4 ${prov.name} 점령! ${oldFaction} \u2192 ${newFactionId}`, 'alert');
    MapRenderer.markDirty();
    FactionManager.modRelation(oldFaction, newFactionId, -15);
  }

  // ── 전투 해결 메인 함수 ──
  function resolveBattle({ attackerDivId, defenderInfo, provinceId }) {
    const atkDiv = MilitaryManager.getDivisionById(attackerDivId);
    if (!atkDiv) {
      return;
    }
    const prov = ProvinceManager.getById(provinceId);
    if (!prov) {
      MilitaryManager.setDivisionState(attackerDivId, 'idle');
      return;
    }

    // 수비 정보 취득
    let defUnits, defFaction, defDivId = null;
    if (defenderInfo.type === 'garrison') {
      const g = MilitaryManager.getGarrison(provinceId);
      if (!g) {
        MilitaryManager.setDivisionState(attackerDivId, 'idle');
        return;
      }
      defUnits  = { infantry:g.infantry, cavalry:g.cavalry, archers:g.archers, siege:g.siege };
      defFaction = g.factionId;
    } else {
      const defDiv = MilitaryManager.getDivisionById(defenderInfo.id);
      if (!defDiv) {
        MilitaryManager.setDivisionState(attackerDivId, 'idle');
        return;
      }
      defUnits  = { ...defDiv.units };
      defFaction = defDiv.factionId;
      defDivId  = defDiv.id;
    }

    // 같은 세력이면 전투 없음
    if (atkDiv.factionId === defFaction) {
      MilitaryManager.setDivisionState(attackerDivId, 'idle');
      if (defDivId) MilitaryManager.setDivisionState(defDivId, 'idle');
      return;
    }

    _totalBattles++;
    _updateBattleStatus();

    // 전투력 계산 + 랜덤 분산 (±7%)
    const atkPower = calcCombatPower(atkDiv.units, atkDiv.factionId, provinceId, false);
    const defPower = calcCombatPower(defUnits, defFaction, provinceId, true);
    const atkRoll  = atkPower * (COMBAT_VARIANCE_MIN + Math.random() * COMBAT_VARIANCE_RANGE);
    const defRoll  = defPower * (COMBAT_VARIANCE_MIN + Math.random() * COMBAT_VARIANCE_RANGE);
    const atkWins  = atkRoll > defRoll;

    // 손실 계산
    const { attackerLoss, defenderLoss } = _calcCasualties(atkRoll, defRoll, atkDiv.units, defUnits);
    const newAtkUnits = _applyUnitCasualties(atkDiv.units, attackerLoss);
    const newDefUnits = _applyUnitCasualties(defUnits, defenderLoss);
    const atkTotal = Object.values(newAtkUnits).reduce((s, v) => s + v, 0);
    const defTotal = Object.values(newDefUnits).reduce((s, v) => s + v, 0);

    Notifications.push(
      `\u2694 전투: ${prov.name} \u2014 ${atkDiv.factionId} ${atkWins ? '승리' : '패배'} vs ${defFaction}`,
      atkWins ? 'good' : 'warn'
    );

    if (atkWins) {
      // 공격자 승리
      if (atkTotal < MIN_DIVISION_SIZE) {
        MilitaryManager.disbandDivision(attackerDivId);
        Notifications.push(`${atkDiv.factionId}: 사단 해산 (병력 소진)`, 'warn');
      } else {
        MilitaryManager.updateDivision(attackerDivId, newAtkUnits);
        MilitaryManager.setDivisionState(attackerDivId, 'idle');
      }
      // 수비자 패배
      if (defDivId !== null) {
        if (defTotal < MIN_DIVISION_SIZE) {
          MilitaryManager.disbandDivision(defDivId);
        } else {
          MilitaryManager.updateDivision(defDivId, newDefUnits);
          MilitaryManager.retreatDivision(defDivId, provinceId);
        }
      } else {
        // 주둔군 손실
        MilitaryManager.updateGarrisonCasualties(provinceId, {
          infantry: (defUnits.infantry || 0) - (newDefUnits.infantry || 0),
          cavalry:  (defUnits.cavalry  || 0) - (newDefUnits.cavalry  || 0),
          archers:  (defUnits.archers  || 0) - (newDefUnits.archers  || 0),
          siege:    (defUnits.siege    || 0) - (newDefUnits.siege    || 0),
        });
      }
      occupyProvince(provinceId, atkDiv.factionId);
    } else {
      // 공격자 패배
      if (atkTotal < MIN_DIVISION_SIZE) {
        MilitaryManager.disbandDivision(attackerDivId);
        Notifications.push(`${atkDiv.factionId}: 사단 해산 (병력 소진)`, 'warn');
      } else {
        MilitaryManager.updateDivision(attackerDivId, newAtkUnits);
        MilitaryManager.retreatDivision(attackerDivId, provinceId);
      }
      // 수비자 손실
      if (defDivId !== null) {
        if (defTotal < MIN_DIVISION_SIZE) {
          MilitaryManager.disbandDivision(defDivId);
        } else {
          MilitaryManager.updateDivision(defDivId, newDefUnits);
          MilitaryManager.setDivisionState(defDivId, 'idle');
        }
      } else {
        MilitaryManager.updateGarrisonCasualties(provinceId, {
          infantry: (defUnits.infantry || 0) - (newDefUnits.infantry || 0),
          cavalry:  (defUnits.cavalry  || 0) - (newDefUnits.cavalry  || 0),
          archers:  (defUnits.archers  || 0) - (newDefUnits.archers  || 0),
          siege:    (defUnits.siege    || 0) - (newDefUnits.siege    || 0),
        });
      }
    }

    MapRenderer.markDirty();
    _updateBattleStatus();
  }

  function _updateBattleStatus() {
    const el = document.getElementById('status-battles');
    if (el) el.textContent = `전투: ${_totalBattles}건`;
  }

  return { resolveBattle, calcCombatPower, occupyProvince };
})();


/* ════════════════════════════════════════════════════════
   BATTLE MANAGER — 다중 일수 전투 진행 관리 (Phase 4)
   전투 시작, 매일 전투 진행, 승패 처리
════════════════════════════════════════════════════════ */
const BattleManager = (() => {
  "use strict";

  const MIN_UNITS               = 50;   // 이 수치 이하면 패배 처리
  const ATTACKER_LOSS_RATE      = 0.03; // 공격측 일일 손실률 (방어력 대비)
  const DEFENDER_LOSS_RATE      = 0.025;// 방어측 일일 손실률 (공격력 대비)
  const COMBAT_VARIANCE_MIN     = 0.7;  // 전투 랜덤 분산 하한
  const COMBAT_VARIANCE_RANGE   = 0.6;  // 전투 랜덤 분산 범위 (합: 0.7~1.3 = ±30%)
  const POWER_ADVANTAGE_THRESH  = 1.3;  // 30% 우세 시 전선 압박 로그 발생
  const BATTLE_LOG_INTERVAL     = 2;    // 일반 전투 로그 간격 (일)
  const SIEGE_LOG_INTERVAL      = 3;    // 공성 로그 간격 (일)
  const SIEGE_DEFENSE_BUFFER    = 500;  // 공성 진행 분모 완충값
  const SIEGE_PROGRESS_MULT     = 3;    // 공성 일일 진행 배율

  let _battles = [];
  let _nextId   = 1;

  // ── 유닛 합산 ──
  function _totalUnits(u) {
    return (u.infantry||0) + (u.cavalry||0) + (u.archers||0) + (u.siege||0);
  }

  // ── 비율 손실 적용 ──
  function _applyLoss(units, loss) {
    const total = units.total;
    if (total <= 0 || loss <= 0) return { ...units };
    const newTotal = Math.max(0, total - loss);
    const ratio    = newTotal / total;
    return {
      infantry: Math.max(0, Math.round((units.infantry||0) * ratio)),
      cavalry:  Math.max(0, Math.round((units.cavalry ||0) * ratio)),
      archers:  Math.max(0, Math.round((units.archers ||0) * ratio)),
      siege:    Math.max(0, Math.round((units.siege   ||0) * ratio)),
      total:    newTotal,
    };
  }

  // ── battleStart 이벤트 핸들러 ──
  function startBattle({ attackerDivId, defenderInfo, provinceId }) {
    const atkDiv = MilitaryManager.getDivisionById(attackerDivId);
    if (!atkDiv) return;
    const prov = ProvinceManager.getById(provinceId);
    if (!prov) { MilitaryManager.setDivisionState(attackerDivId, 'idle'); return; }

    let defUnitsRaw, defFaction;
    if (defenderInfo.type === 'garrison') {
      const g = MilitaryManager.getGarrison(provinceId);
      if (!g) { MilitaryManager.setDivisionState(attackerDivId, 'idle'); return; }
      defUnitsRaw = { infantry:g.infantry, cavalry:g.cavalry, archers:g.archers, siege:g.siege };
      defFaction  = g.factionId;
    } else {
      const defDiv = MilitaryManager.getDivisionById(defenderInfo.id);
      if (!defDiv) { MilitaryManager.setDivisionState(attackerDivId, 'idle'); return; }
      defUnitsRaw = { ...defDiv.units };
      defFaction  = defDiv.factionId;
      MilitaryManager.setDivisionState(defenderInfo.id, 'fighting');
    }

    if (atkDiv.factionId === defFaction) {
      MilitaryManager.setDivisionState(attackerDivId, 'idle');
      if (defenderInfo.type === 'division') MilitaryManager.setDivisionState(defenderInfo.id, 'idle');
      return;
    }

    const atkUnits = { ...atkDiv.units, total: _totalUnits(atkDiv.units) };
    const defUnits = { ...defUnitsRaw,  total: _totalUnits(defUnitsRaw)  };
    const isSiege  = defenderInfo.type === 'garrison' &&
                     prov.buildings.some(b => b === '요새' || b === '성벽');

    const battle = {
      id: _nextId++,
      provinceId,
      attackFaction: atkDiv.factionId,
      defendFaction: defFaction,
      attackerDivId,
      defenderInfo,
      attackUnits:  atkUnits,
      defendUnits:  defUnits,
      attackPower:  0,
      defendPower:  0,
      day:          1,
      type:         isSiege ? 'siege' : 'battle',
      siegePct:     0,
      log:          [],
      status:       'ongoing',
    };
    battle.log.push(`1일차: ${battle.attackFaction} ${prov.name} 공격 개시, ${battle.defendFaction} 방어선 구축`);
    _battles.push(battle);
    _refreshStatusBar();
    return battle.id;
  }

  // ── 테스트용 전투 직접 생성 ──
  function createTestBattle({ provinceId, attackFaction, defendFaction, type, day, siegePct, atkUnits, defUnits }) {
    const atkU   = { ...atkUnits,  total: _totalUnits(atkUnits)  };
    const defU   = { ...defUnits,  total: _totalUnits(defUnits)  };
    const prov   = ProvinceManager.getById(provinceId);
    const name   = prov ? prov.name : `P${provinceId}`;
    const log    = [];
    const d      = day || 1;
    log.push(`1일차: ${attackFaction} ${name} 공격 개시, ${defendFaction} 방어선 구축`);
    for (let i = 2; i <= d; i++) log.push(`${i}일차: 치열한 교전 계속`);

    const b = {
      id: _nextId++,
      provinceId,
      attackFaction,
      defendFaction,
      attackerDivId: null,
      defenderInfo:  null,
      attackUnits:   atkU,
      defendUnits:   defU,
      attackPower:   0,
      defendPower:   0,
      day:           d,
      type:          type || 'battle',
      siegePct:      siegePct || 0,
      log,
      status: 'ongoing',
    };
    _battles.push(b);
    _refreshStatusBar();
    return b.id;
  }

  // ── 매틱 호출 ──
  function onTick() {
    _battles.forEach(b => { if (b.status === 'ongoing') _advanceBattle(b); });
    _battles = _battles.filter(b => b.status === 'ongoing');
    _refreshStatusBar();
  }

  // ── 전투 1일 진행 ──
  function _advanceBattle(b) {
    b.day++;
    const atkPow = CombatEngine.calcCombatPower(b.attackUnits, b.attackFaction, b.provinceId, false);
    const defPow = CombatEngine.calcCombatPower(b.defendUnits, b.defendFaction, b.provinceId, true);
    b.attackPower = atkPow;
    b.defendPower = defPow;
    const variance = COMBAT_VARIANCE_MIN + Math.random() * COMBAT_VARIANCE_RANGE;

    if (b.type === 'siege') {
      b.siegePct = Math.min(100, b.siegePct + (atkPow / (defPow + SIEGE_DEFENSE_BUFFER)) * SIEGE_PROGRESS_MULT);
      if (b.day % SIEGE_LOG_INTERVAL === 0) {
        const msg = b.siegePct < 30
          ? `${b.day}일차: 공성 초기 단계, 방어군 저항`
          : b.siegePct < 70
            ? `${b.day}일차: 성벽 파괴 진행 중...`
            : `${b.day}일차: 함락 임박! 수비군 최후 저항`;
        b.log.push(msg);
      }
      if (b.siegePct >= 100) {
        b.log.push(`${b.day}일차: ${b.attackFaction} 공성 성공!`);
        _resolveAttackerWin(b);
      }
    } else {
      const attLoss = Math.round(defPow * ATTACKER_LOSS_RATE  * variance);
      const defLoss = Math.round(atkPow * DEFENDER_LOSS_RATE  * variance);
      b.attackUnits = _applyLoss(b.attackUnits, attLoss);
      b.defendUnits = _applyLoss(b.defendUnits, defLoss);

      if (b.day % BATTLE_LOG_INTERVAL === 0) {
        let logMsg;
        if      (b.attackUnits.total <= MIN_UNITS)          logMsg = `${b.day}일차: ${b.attackFaction} 전열 붕괴`;
        else if (b.defendUnits.total <= MIN_UNITS)          logMsg = `${b.day}일차: ${b.defendFaction} 전열 붕괴`;
        else if (atkPow > defPow * POWER_ADVANTAGE_THRESH)  logMsg = `${b.day}일차: ${b.attackFaction} 전선 압박`;
        else if (defPow > atkPow * POWER_ADVANTAGE_THRESH)  logMsg = `${b.day}일차: ${b.defendFaction} 수비 성공`;
        else                                                logMsg = `${b.day}일차: 치열한 교전 계속`;
        b.log.push(logMsg);
      }

      if      (b.defendUnits.total <= MIN_UNITS) _resolveAttackerWin(b);
      else if (b.attackUnits.total <= MIN_UNITS) _resolveDefenderWin(b);
    }
  }

  // ── 공격 측 승리 ──
  function _resolveAttackerWin(b) {
    b.status = 'resolved';
    const prov = ProvinceManager.getById(b.provinceId);
    const name = prov ? prov.name : String(b.provinceId);
    Notifications.push(`⚔ ${name}: ${b.attackFaction} 승리 vs ${b.defendFaction}`, 'good');

    if (b.attackerDivId) {
      MilitaryManager.updateDivision(b.attackerDivId, b.attackUnits);
      MilitaryManager.setDivisionState(b.attackerDivId, 'idle');
    }
    if (b.defenderInfo) {
      if (b.defenderInfo.type === 'garrison') {
        const g = MilitaryManager.getGarrison(b.provinceId);
        if (g) {
          MilitaryManager.updateGarrisonCasualties(b.provinceId, {
            infantry: Math.max(0, g.infantry - (b.defendUnits.infantry || 0)),
            cavalry:  Math.max(0, g.cavalry  - (b.defendUnits.cavalry  || 0)),
            archers:  Math.max(0, g.archers  - (b.defendUnits.archers  || 0)),
            siege:    Math.max(0, g.siege    - (b.defendUnits.siege    || 0)),
          });
        }
      } else {
        const defDiv = MilitaryManager.getDivisionById(b.defenderInfo.id);
        if (defDiv) {
          MilitaryManager.updateDivision(b.defenderInfo.id, b.defendUnits);
          MilitaryManager.retreatDivision(b.defenderInfo.id, b.provinceId);
        }
      }
      CombatEngine.occupyProvince(b.provinceId, b.attackFaction);
    }
    MapRenderer.markDirty();
  }

  // ── 방어 측 승리 ──
  function _resolveDefenderWin(b) {
    b.status = 'resolved';
    const prov = ProvinceManager.getById(b.provinceId);
    const name = prov ? prov.name : String(b.provinceId);
    Notifications.push(`🛡 ${name}: ${b.defendFaction} 수비 성공 vs ${b.attackFaction}`, 'warn');

    if (b.attackerDivId) {
      MilitaryManager.updateDivision(b.attackerDivId, b.attackUnits);
      MilitaryManager.retreatDivision(b.attackerDivId, b.provinceId);
    }
    if (b.defenderInfo && b.defenderInfo.type === 'division') {
      const defDiv = MilitaryManager.getDivisionById(b.defenderInfo.id);
      if (defDiv) {
        MilitaryManager.updateDivision(b.defenderInfo.id, b.defendUnits);
        MilitaryManager.setDivisionState(b.defenderInfo.id, 'idle');
      }
    }
    MapRenderer.markDirty();
  }

  // ── 조회 ──
  function getAll()                    { return _battles.filter(b => b.status === 'ongoing'); }
  function getById(id)                 { return _battles.find(b => b.id === id); }
  function getBattlesAt(provinceId)    { return _battles.filter(b => b.provinceId === provinceId && b.status === 'ongoing'); }

  function _refreshStatusBar() {
    const el    = document.getElementById('status-battles');
    const count = getAll().length;
    if (el) {
      el.textContent = `⚔ 전투: ${count}건`;
      el.style.color = count > 0 ? '#e94560' : '';
    }
  }

  return { startBattle, createTestBattle, onTick, getAll, getById, getBattlesAt };
})();


/* ════════════════════════════════════════════════════════
   BATTLE OVERLAY — 맵 위 전투 카드 DOM 오버레이 (Phase 4)
════════════════════════════════════════════════════════ */
const BattleOverlay = (() => {
  "use strict";

  let _cards = {}; // battleId → HTMLElement

  // ── 전투 목록 기반으로 카드 생성/업데이트/삭제 ──
  function update() {
    const battles = BattleManager.getAll();
    const wrap    = document.getElementById('canvas-wrap');
    if (!wrap) return;

    // 해소된 전투 카드 제거
    const activeIds = new Set(battles.map(b => b.id));
    Object.keys(_cards).forEach(id => {
      if (!activeIds.has(parseInt(id))) {
        _cards[id].remove();
        delete _cards[id];
      }
    });

    // 생성 / 콘텐츠 업데이트
    battles.forEach(b => {
      if (!_cards[b.id]) {
        const card = document.createElement('div');
        card.className = 'battle-card' + (b.type === 'siege' ? ' siege' : '');
        card.addEventListener('click', e => {
          e.stopPropagation();
          UI.showBattleDetail(b.id);
        });
        wrap.appendChild(card);
        _cards[b.id] = card;
      }
      _updateCardContent(_cards[b.id], b);
      _positionCard(_cards[b.id], b);
    });
  }

  // ── 위치만 업데이트 (렌더 루프에서 호출) ──
  function reposition() {
    BattleManager.getAll().forEach(b => {
      if (_cards[b.id]) _positionCard(_cards[b.id], b);
    });
  }

  function _positionCard(card, battle) {
    const prov = ProvinceManager.getById(battle.provinceId);
    if (!prov) return;
    const [cx, cy] = MapRenderer.polyCenter(prov.poly);
    card.style.left = Math.round(cx - 110) + 'px';
    card.style.top  = Math.round(cy + 8)   + 'px';
  }

  function _updateCardContent(card, b) {
    const prov     = ProvinceManager.getById(b.provinceId);
    const provName = prov ? prov.name : `P${b.provinceId}`;
    const atkF     = ProvinceManager.getFaction(b.attackFaction);
    const defF     = ProvinceManager.getFaction(b.defendFaction);
    const atkColor = atkF ? atkF.color : '#e94560';
    const defColor = defF ? defF.color : '#5a8ad0';

    if (b.type === 'siege') {
      const pct = Math.min(100, Math.round(b.siegePct));
      card.innerHTML = `
        <div class="battle-card-title">🏰 ${provName} 공성전<span class="battle-day">[${b.day}일째]</span></div>
        <div class="siege-bar-bg"><div class="siege-bar-fill" style="width:${pct}%"></div></div>
        <div class="battle-forces">
          <span class="att" style="color:${atkColor}">${b.attackFaction}</span>
          <span style="color:#f5a623;font-weight:bold">${pct}%</span>
          <span class="def" style="color:${defColor}">${b.defendFaction}</span>
        </div>
        <div class="battle-card-footer">
          <span>공격 ${b.attackUnits.total.toLocaleString()}</span>
          <span>수비 ${b.defendUnits.total.toLocaleString()}</span>
        </div>`;
    } else {
      const total  = (b.attackPower || 1) + (b.defendPower || 1);
      const atkPct = Math.round((b.attackPower || 0) / total * 100) || 50;
      const defPct = 100 - atkPct;
      card.innerHTML = `
        <div class="battle-card-title">⚔ ${provName} 전투<span class="battle-day">[${b.day}일째]</span></div>
        <div class="battle-vs-row">
          <div class="battle-bar attacker" style="flex:${atkPct}"></div>
          <div class="battle-vs-center">VS</div>
          <div class="battle-bar defender" style="flex:${defPct}"></div>
        </div>
        <div class="battle-forces">
          <span class="att" style="color:${atkColor}">${b.attackFaction}</span>
          <span class="def" style="color:${defColor}">${b.defendFaction}</span>
        </div>
        <div class="battle-forces">
          <span style="color:#bbb">${b.attackUnits.total.toLocaleString()}명</span>
          <span style="color:#bbb">${b.defendUnits.total.toLocaleString()}명</span>
        </div>
        <div class="battle-card-footer">
          <span>⚔ ${b.attackPower ? Math.round(b.attackPower).toLocaleString() : '?'}</span>
          <span>${b.defendPower ? Math.round(b.defendPower).toLocaleString() : '?'} ⚔</span>
        </div>`;
    }
  }

  return { update, reposition };
})();



const Notifications = (() => {
  let feed = null;

  function init() {
    feed = document.createElement('div');
    feed.id = 'notif-feed';
    document.getElementById('canvas-wrap').appendChild(feed);
  }

  function push(msg, type = '') {
    if (!feed) return;
    const el = document.createElement('div');
    el.className = 'notif-item' + (type ? ` ${type}` : '');
    el.textContent = msg;
    feed.prepend(el);
    setTimeout(() => el.remove(), 5500);
    // 최대 5개 유지
    while (feed.children.length > 5) feed.lastChild.remove();
  }

  return { init, push };
})();


/* ════════════════════════════════════════════════════════
   M09 — EconomyEngine (경제 엔진 고도화)
════════════════════════════════════════════════════════ */
const EconomyEngine = (() => {
  "use strict";

  const FOOD_SURPLUS_THRESHOLD = 300; // food stock above this triggers surplus trade
  const MAX_FOOD_TRADE_AMOUNT  = 80;  // max food units transferred per trade
  const FOOD_STOCK_CAP         = 9999;

  const RESOURCE_YIELD = {
    '곡물': { food: 15 }, '쌀': { food: 20 },
    '철광': { iron: 12 }, '구리': { iron: 8 },
    '목재': { wood: 10 }, '금': { gold: 8 },
    '어류': { food: 8 }, '소금': { gold: 3, food: 3 },
    '말': { cavalry_bonus: 0.1 }, '직물': { gold: 6 },
    '도자기': { gold: 7 }, '인삼': { gold: 10 },
    '교역품': { gold: 12 }, '진주': { gold: 15 },
    '약초': { gold: 5 }, '면화': { gold: 6 },
  };

  const BUILDING_YIELD = {
    '농장': { food: 20 }, '목장': { food: 15, cavalry_bonus: 0.05 },
    '채굴장': { iron: 15 }, '제련소': { iron: 20, gold: 5 },
    '목재소': { wood: 18 }, '항구': { gold: 20, food: 10 },
    '교역소': { gold: 18 }, '시장': { gold: 22 },
    '창고': { storage_bonus: 0.2 }, '사원': { stability: 0.3 },
    '학당': { tech_points: 1 }, '성벽': { defense_bonus: 0.15 },
    '요새': { defense_bonus: 0.3 }, '왕궁': { gold: 30, stability: 0.5 },
    '어항': { food: 12, gold: 8 },
  };

  // 세력별 자원 재고
  const _stocks = {};

  function _getFactions() {
    return Object.values(ProvinceManager.getFactions()).filter(f => f.id !== '미지');
  }

  function _initStocks() {
    _getFactions().forEach(f => {
      const st = FactionManager.getFactionState(f.id);
      _stocks[f.id] = { gold: (st && st.gold) || 500, food: 200, iron: 100, wood: 80 };
    });
  }

  function calcProvinceOutput(province) {
    const out = { gold: 0, food: 0, iron: 0, wood: 0 };
    if (province.resources) {
      province.resources.forEach(r => {
        const y = RESOURCE_YIELD[r];
        if (y) {
          if (y.gold)  out.gold  += y.gold;
          if (y.food)  out.food  += y.food;
          if (y.iron)  out.iron  += y.iron;
          if (y.wood)  out.wood  += y.wood;
        }
      });
    }
    if (province.buildings) {
      province.buildings.forEach(b => {
        const y = BUILDING_YIELD[b];
        if (y) {
          if (y.gold)  out.gold  += y.gold;
          if (y.food)  out.food  += y.food;
          if (y.iron)  out.iron  += y.iron;
          if (y.wood)  out.wood  += y.wood;
        }
      });
    }
    const dev = province.development || 1;
    out.gold  = Math.round(out.gold  * (1 + dev * 0.05));
    out.food  = Math.round(out.food  * (1 + dev * 0.03));
    out.iron  = Math.round(out.iron  * (1 + dev * 0.02));
    out.wood  = Math.round(out.wood  * (1 + dev * 0.02));
    return out;
  }

  function calcFactionResources(factionId) {
    const provinces = ProvinceManager.getFactionProvinces(factionId);
    const total = { gold: 0, food: 0, iron: 0, wood: 0 };
    provinces.forEach(p => {
      const out = calcProvinceOutput(p);
      total.gold += out.gold;
      total.food += out.food;
      total.iron += out.iron;
      total.wood += out.wood;
    });
    return total;
  }

  function getStocks() { return _stocks; }

  function getStock(factionId) {
    return _stocks[factionId] || { gold: 0, food: 0, iron: 0, wood: 0 };
  }

  function onMonthTick() {
    const factions = _getFactions();
    // 초기화 보장
    factions.forEach(f => {
      if (!_stocks[f.id]) {
        const st = FactionManager.getFactionState(f.id);
        _stocks[f.id] = { gold: (st && st.gold) || 500, food: 200, iron: 100, wood: 80 };
      }
    });

    factions.forEach(f => {
      const out = calcFactionResources(f.id);
      const s = _stocks[f.id];

      s.gold  = Math.max(0, s.gold  + out.gold);
      // food is allowed to go negative here so shortage detection below can apply a penalty
      s.food  += out.food;
      s.iron  = Math.max(0, s.iron  + out.iron);
      s.wood  = Math.max(0, s.wood  + out.wood);

      if (s.food < 0) {
        // 안정도 패널티
        const allStates = FactionManager.getAllFactionStates();
        if (allStates[f.id]) {
          allStates[f.id].stability = Math.max(0, (allStates[f.id].stability || 50) - 3);
        }
        Notifications.push(`⚠ ${f.name} 식량 부족! 안정도가 하락합니다`, 'warn');
        s.food = 0;
      } else {
        s.food = Math.min(s.food, FOOD_STOCK_CAP);
      }
    });

    _doFoodTrade(factions);
  }

  function _doFoodTrade(factions) {
    const surplusFactions = factions.filter(f => (_stocks[f.id] || {}).food > FOOD_SURPLUS_THRESHOLD);
    const deficitFactions = factions.filter(f => (_stocks[f.id] || {}).food < 50);
    surplusFactions.forEach(sf => {
      deficitFactions.forEach(df => {
        if (sf.id === df.id) return;
        const rel = FactionManager.getRelation(sf.id, df.id);
        if (rel >= 25) {
          const tradeAmt = Math.min(MAX_FOOD_TRADE_AMOUNT, (_stocks[sf.id].food - FOOD_SURPLUS_THRESHOLD));
          if (tradeAmt > 0) {
            _stocks[sf.id].food -= tradeAmt;
            _stocks[df.id].food += tradeAmt;
            Notifications.push(`🤝 ${sf.name} → ${df.name} 식량 교역 (${tradeAmt})`);
          }
        }
      });
    });
  }

  _initStocks();

  return { calcProvinceOutput, calcFactionResources, onMonthTick, getStock, getStocks, RESOURCE_YIELD, BUILDING_YIELD };
})();

        { text: '전국에 보급한다 (금화 -60)', effect: { gold: -60, development_all: 1 } },
        { text: '일부에만 적용한다 (금화 -20)', effect: { gold: -20 } },
      ]
    },
  ];

  let _eventQueue = [];
  let _activeEvent = null;
  let _activeContext = null;
  let _pausedByEvent = false;
  const _cooldown = {}; // eventId:factionId → remaining months

  function _getFactions() {
    return Object.values(ProvinceManager.getFactions()).filter(f => f.id !== '미지');
  }

  function _tickCooldowns() {
    Object.keys(_cooldown).forEach(k => {
      if (_cooldown[k] > 0) _cooldown[k]--;
    });
  }

  function _checkTrigger(def, faction, provinces) {
    const t = def.trigger;
    const st = FactionManager.getFactionState(faction.id);
    const stability = st ? (st.stability || 50) : 50;

    const cdKey = def.id + ':' + faction.id;
    if (_cooldown[cdKey] && _cooldown[cdKey] > 0) {
      return false;
    }

    let passes = true;
    if (t.stability_below !== undefined && stability >= t.stability_below) passes = false;
    if (t.stability_above !== undefined && stability < t.stability_above) passes = false;
    if (t.terrain) {
      const hasTerrain = provinces.some(p => p.terrain === t.terrain);
      if (!hasTerrain) passes = false;
    }
    if (t.building) {
      const hasBuilding = provinces.some(p => p.buildings && p.buildings.includes(t.building));
      if (!hasBuilding) passes = false;
    }
    if (t.population_above) {
      const totalPop = provinces.reduce((s, p) => s + (p.population || 0), 0);
      if (totalPop < t.population_above) passes = false;
    }
    if (t.relation_above !== undefined) {
      const allFactions = _getFactions();
      const hasGoodRelation = allFactions.some(other => {
        if (other.id === faction.id) return false;
        return FactionManager.getRelation(faction.id, other.id) >= t.relation_above;
      });
      if (!hasGoodRelation) passes = false;
    }

    if (!passes) return false;
    return Math.random() < t.probability;
  }

  function checkEvents() {
    if (_activeEvent) return;
    _tickCooldowns();
    const factions = _getFactions();
    factions.forEach(faction => {
      const provinces = ProvinceManager.getFactionProvinces(faction.id);
      if (!provinces.length) return;

      EVENT_DEFS.forEach(def => {
        if (_activeEvent) return;
        if (_checkTrigger(def, faction, provinces)) {
          _cooldown[def.id + ':' + faction.id] = EVENT_COOLDOWN_MONTHS;
          let targetFaction = null;
          if (def.trigger.relation_above !== undefined) {
            const candidates = factions.filter(other => {
              if (other.id === faction.id) return false;
              return FactionManager.getRelation(faction.id, other.id) >= (def.trigger.relation_above || 0);
            });
            if (candidates.length) targetFaction = candidates[Math.floor(Math.random() * candidates.length)];
          }
          _eventQueue.push({ def, faction, targetFaction });
        }
      });
    });

    if (_eventQueue.length && !_activeEvent) {
      const next = _eventQueue.shift();
      showEvent(next.def, { faction: next.faction, targetFaction: next.targetFaction });
    }
  }

  function _effectText(effect) {
    const parts = [];
    if (effect.gold)            parts.push(`금화 ${effect.gold > 0 ? '+' : ''}${effect.gold}`);
    if (effect.food)            parts.push(`식량 ${effect.food > 0 ? '+' : ''}${effect.food}`);
    if (effect.stability)       parts.push(`안정도 ${effect.stability > 0 ? '+' : ''}${effect.stability}`);
    if (effect.prestige)        parts.push(`위신 ${effect.prestige > 0 ? '+' : ''}${effect.prestige}`);
    if (effect.population)      parts.push(`인구 ${effect.population > 0 ? '+' : ''}${effect.population}`);
    if (effect.relation_all)    parts.push(`전체 관계 ${effect.relation_all > 0 ? '+' : ''}${effect.relation_all}`);
    if (effect.relation_target) parts.push(`대상 관계 ${effect.relation_target > 0 ? '+' : ''}${effect.relation_target}`);
    if (effect.development_all) parts.push(`전 프로빈스 개발도 +${effect.development_all}`);
    return parts.join(', ');
  }

  function showEvent(def, context) {
    _activeEvent = def;
    _activeContext = context;

    const overlay = document.getElementById('event-overlay');
    if (!overlay) return;

    document.getElementById('event-icon').textContent    = def.icon;
    document.getElementById('event-title').textContent   = def.title;
    document.getElementById('event-faction').textContent = context.faction ? context.faction.name : '';
    document.getElementById('event-desc').textContent    = def.desc;

    const choicesEl = document.getElementById('event-choices');
    choicesEl.innerHTML = '';
    def.choices.forEach((choice, i) => {
      const btn = document.createElement('button');
      btn.className = 'event-choice-btn';
      btn.innerHTML = choice.text + '<span class="choice-effect">' + _effectText(choice.effect) + '</span>';
      btn.addEventListener('click', () => resolveChoice(i));
      choicesEl.appendChild(btn);
    });

    if (!GameCore.getState().paused) { _pausedByEvent = true; GameCore.togglePause(); }
    overlay.style.display = 'flex';
  }

  function resolveChoice(choiceIdx) {
    if (!_activeEvent) return;
    const def     = _activeEvent;
    const context = _activeContext;
    const choice  = def.choices[choiceIdx];
    const effect  = choice.effect;
    const faction = context && context.faction;

    if (faction) {
      const stock = EconomyEngine.getStock(faction.id);
      if (effect.gold)      stock.gold = Math.max(0, stock.gold + effect.gold);
      if (effect.food)      stock.food = Math.max(0, stock.food + effect.food);

      const allStates = FactionManager.getAllFactionStates();
      if (effect.stability && allStates[faction.id]) {
        allStates[faction.id].stability = Math.max(0, Math.min(100,
          (allStates[faction.id].stability || 50) + effect.stability));
      }
      if (effect.prestige && allStates[faction.id]) {
        allStates[faction.id].prestige = (allStates[faction.id].prestige || 0) + effect.prestige;
      }
      if (effect.relation_all) {
        _getFactions().forEach(other => {
          if (other.id !== faction.id)
            FactionManager.modRelation(faction.id, other.id, effect.relation_all);
        });
      }
      if (effect.relation_target && context.targetFaction) {
        FactionManager.modRelation(faction.id, context.targetFaction.id, effect.relation_target);
      }
      if (effect.development_all) {
        ProvinceManager.getFactionProvinces(faction.id).forEach(p => {
          p.development = (p.development || 1) + effect.development_all;
        });
      }
    }

    Notifications.push(`📜 ${def.title}: ${choice.text.split('(')[0].trim()}`, 'good');

    const overlay = document.getElementById('event-overlay');
    if (overlay) overlay.style.display = 'none';
    if (_pausedByEvent && GameCore.getState().paused) { GameCore.togglePause(); _pausedByEvent = false; }

    _activeEvent   = null;
    _activeContext = null;

    setTimeout(() => {
      if (_eventQueue.length && !_activeEvent) {
        const next = _eventQueue.shift();
        showEvent(next.def, { faction: next.faction, targetFaction: next.targetFaction });
      }
    }, EVENT_TRANSITION_DELAY);
  }

  return { checkEvents, showEvent, resolveChoice, getQueue: () => _eventQueue };
})();


/* ════════════════════════════════════════════════════════
   MinimapRenderer — 미니맵
════════════════════════════════════════════════════════ */
const MinimapRenderer = (() => {
  "use strict";

  let _canvas = null;
  let _ctx    = null;
  const W = 180, H = 140;

  function init() {
    _canvas = document.getElementById('minimap');
    if (!_canvas) return;
    _ctx = _canvas.getContext('2d');
    _canvas.addEventListener('click', _onClick);
    update();
  }

  function _getMapBounds() {
    const provinces = ProvinceManager.getAll();
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    provinces.forEach(p => {
      if (!p.polygon) return;
      p.polygon.forEach(([x, y]) => {
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
      });
    });
    return { minX, minY, maxX, maxY };
  }

  function update() {
    if (!_ctx) return;
    _ctx.clearRect(0, 0, W, H);
    _ctx.fillStyle = '#0a0a1a';
    _ctx.fillRect(0, 0, W, H);

    const provinces = ProvinceManager.getAll();
    const bounds = _getMapBounds();
    if (bounds.minX === Infinity) return;

    const bw = bounds.maxX - bounds.minX || 1;
    const bh = bounds.maxY - bounds.minY || 1;
    const pad = 4;
    const scaleX = (W - pad * 2) / bw;
    const scaleY = (H - pad * 2) / bh;
    const mmScale = Math.min(scaleX, scaleY);
    const offX    = pad + (W - pad * 2 - bw * mmScale) / 2;
    const offY    = pad + (H - pad * 2 - bh * mmScale) / 2;

    const FACTION_COLORS = {
      '고려': '#3a8a5a', '북방부족': '#8a3a3a', '남방': '#8a7a3a',
      '동방호족': '#3a5a8a', '서방상인': '#7a4a8a',
    };
    provinces.forEach(p => {
      if (!p.polygon || !p.polygon.length) return;
      _ctx.beginPath();
      p.polygon.forEach(([x, y], i) => {
        const mx = offX + (x - bounds.minX) * mmScale;
        const my = offY + (y - bounds.minY) * mmScale;
        i === 0 ? _ctx.moveTo(mx, my) : _ctx.lineTo(mx, my);
      });
      _ctx.closePath();
      _ctx.fillStyle = FACTION_COLORS[p.faction] || '#2a3a4a';
      _ctx.fill();
      _ctx.strokeStyle = '#0a1020';
      _ctx.lineWidth = 0.5;
      _ctx.stroke();
    });

    // 뷰포트 사각형
    const vs = MapRenderer.getViewState();
    if (vs) {
      const gameCanvas = document.getElementById('gameCanvas');
      const cw = gameCanvas ? gameCanvas.width  : 800;
      const ch = gameCanvas ? gameCanvas.height : 600;
      const vx1 = (-vs.offsetX) / vs.scale;
      const vy1 = (-vs.offsetY) / vs.scale;
      const vx2 = vx1 + cw / vs.scale;
      const vy2 = vy1 + ch / vs.scale;
      const rx1 = offX + (vx1 - bounds.minX) * mmScale;
      const ry1 = offY + (vy1 - bounds.minY) * mmScale;
      const rx2 = offX + (vx2 - bounds.minX) * mmScale;
      const ry2 = offY + (vy2 - bounds.minY) * mmScale;
      _ctx.strokeStyle = 'rgba(255,255,255,0.8)';
      _ctx.lineWidth = 1.5;
      _ctx.strokeRect(rx1, ry1, rx2 - rx1, ry2 - ry1);
    }
  }

  function _onClick(e) {
    if (!_canvas) return;
    const rect = _canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const bounds = _getMapBounds();
    if (bounds.minX === Infinity) return;

    const bw = bounds.maxX - bounds.minX || 1;
    const bh = bounds.maxY - bounds.minY || 1;
    const pad = 4;
    const mmScale = Math.min((W - pad * 2) / bw, (H - pad * 2) / bh);
    const offX    = pad + (W - pad * 2 - bw * mmScale) / 2;
    const offY    = pad + (H - pad * 2 - bh * mmScale) / 2;

    const mapX = bounds.minX + (mx - offX) / mmScale;
    const mapY = bounds.minY + (my - offY) / mmScale;

    MapRenderer.panTo(mapX, mapY);
  }

  return { init, update };
})();

      text: '불안정',
      detail: '안정도가 30 미만입니다. 민란이 발생할 수 있습니다.',
      priority: 'high',
      check: () => { const st = FactionManager.getFactionState('고려'); return st && st.stability < 30; },

      icon: '⚔',
      text: '지휘관 없음',
      detail: '지휘관 역할 캐릭터가 배정되지 않았습니다.',
      priority: 'medium',
      check: () => {
        const chars = typeof CharacterManager.getAll === 'function'
          ? CharacterManager.getAll().filter(c => c.faction === '고려' && c.role === 'general')
          : [];
        return chars.length === 0;
      },
      action: 'open_characters',
    },
    {
      id: 'event_pending',

      text: (count) => `미결 이벤트 ${count}건`,

    },
    {

      icon: '⚔',
      text: '전쟁 중',
      detail: '현재 전쟁이 진행 중입니다. 외교 패널에서 강화조약을 제의하세요.',
      priority: 'high',
      check: () => {
        try {
          return WarSystem.getWars().some(w => w.attacker === '고려' || w.defender === '고려');
        } catch(e) { return false; }
      },
      action: 'open_diplomacy',
    },
    {
      id: 'occupied_province',
      icon: '🏴',
      text: '영토 점령됨',
      detail: '우리 영토가 적에게 점령되었습니다. 외교 패널을 확인하세요.',
      priority: 'high',
      check: () => {
        try {
          const occs = WarSystem.getOccupations();
          return Object.entries(occs).some(([pid, o]) => {
            const p = ProvinceManager.getById(pid);
            return p && p.faction === '고려' && o.occupiedBy !== '고려';
          });
        } catch(e) { return false; }
      },
      action: 'open_diplomacy',
    },
    {
      id: 'paying_tribute',
      icon: '💸',
      text: '조공 납부 중',
      detail: '매월 금화를 조공으로 납부하고 있습니다.',
      priority: 'medium',
      check: () => {
        try {
          return WarSystem.getTributes().some(t => t.payer === '고려');
        } catch(e) { return false; }
      },
      action: 'open_diplomacy',
    },
    {
      id: 'no_alliance',
      icon: '🤝',
      text: '고립 외교',
      priority: 'low',
      detail: '동맹 세력이 없습니다. 외교 패널에서 동맹을 체결하세요.',
      check() {
        try {
          return DiplomacyManager.getAlliances().filter(k => k.includes('고려')).length === 0;
        } catch(e) { return false; }
      },
      action: 'open_diplomacy',
    },
    {
      id: 'vassal_revolt_risk',
      icon: '⚡',
      text: '종속 반란 위험',
      priority: 'medium',
      detail: '종속 세력의 관계도가 매우 낮아 반란 위험이 있습니다.',
      check() {
        try {
          const vassals = DiplomacyManager.getVassals('고려');
          return vassals.some(v => {
            const rel = FactionManager.getRelation ? FactionManager.getRelation('고려', v) : 0;
            return rel < -30;
          });
        } catch(e) { return false; }
      },
      action: 'open_diplomacy',
    },
  ];

  let activeAlerts = [];

  function refresh() {
    activeAlerts = [];
    for (const def of ALERT_DEFS) {
      try {
        const result = def.check();
        if (result !== false && result !== null && result !== undefined) {
          activeAlerts.push({ ...def, count: typeof result === 'number' ? result : null });
        }
      } catch(e) { /* 안전하게 무시 */ }
    }
    renderTray();
  }

  function renderTray() {
    const tray = document.getElementById('alert-tray');
    if (!tray) return;
    tray.innerHTML = '';
    for (const alert of activeAlerts) {
      const btn = document.createElement('button');
      btn.className = `alert-btn priority-${alert.priority}`;
      const textContent = typeof alert.text === 'function'
        ? alert.text(alert.count)
        : alert.text;
      btn.innerHTML = `
        <span class="ab-icon">${alert.icon}</span>
        <span class="ab-text">${textContent}</span>
        ${alert.count > 1 ? `<span class="ab-count">${alert.count}</span>` : ''}
      `;
      btn.title = alert.detail;
      btn.onclick = () => handleAction(alert.action, alert);
      tray.appendChild(btn);
    }
  }

  function handleAction(action) {
    switch(action) {
      case 'open_characters':  ActionPanels.openCharacters(); break;
      case 'open_economy':     ActionPanels.openEconomy(); break;
      case 'open_stability':   ActionPanels.openStability(); break;
      case 'open_diplomacy':   ActionPanels.openDiplomacy(); break;
      case 'open_events':      ActionPanels.openEvents(); break;
      case 'open_province':    ActionPanels.openProvinceList(); break;
      case 'open_trade':       ActionPanels.openTrade(); break;
    }
  }

  return { refresh, renderTray, getAlerts: () => activeAlerts };
})();

/* ════════════════════════════════════════════════════════
   ActionPanels — 슬라이드인 액션 패널
════════════════════════════════════════════════════════ */
const ActionPanels = (() => {
  "use strict";
  let currentPanel = null;

  function _open(icon, title, contentFn) {
    document.getElementById('action-panel-overlay').style.display = 'block';
    document.getElementById('action-panel-icon').textContent = icon;
    document.getElementById('action-panel-title').textContent = title;
    document.getElementById('action-panel-body').innerHTML = contentFn();
    currentPanel = { icon, title, contentFn };
  }

  function close() {
    document.getElementById('action-panel-overlay').style.display = 'none';
    currentPanel = null;
  }

  function refresh() {
    if (currentPanel) {
      document.getElementById('action-panel-body').innerHTML = currentPanel.contentFn();
    }
  }

  // ── 경제 패널 ──
  function openEconomy() {
    _open('💰', '경제 현황', () => {
      const st = FactionManager.getFactionState('고려');
      if (!st) return '<p style="color:#556">데이터 없음</p>';
      const eco = FactionManager.calcMonthlyIncome('고려');
      const net = eco ? (eco.income - eco.expenses) : 0;
      const netClass = net >= 0 ? 'positive' : 'negative';
      const netSign = net >= 0 ? '+' : '';
      return `
        <div class="ap-section">
          <div class="ap-section-title">재정 현황</div>
          <div class="ap-row"><span class="ap-label">금화</span><span class="ap-value">${Math.floor(st.gold)}💰</span></div>
          <div class="ap-row"><span class="ap-label">월수입</span><span class="ap-value positive">+${Math.floor(eco ? eco.income : 0)}</span></div>
          <div class="ap-row"><span class="ap-label">월지출</span><span class="ap-value negative">-${Math.floor(eco ? eco.expenses : 0)}</span></div>

          </div>
          <div class="ap-row" style="margin-top:6px"><span class="ap-label">안정도</span>
            <span class="ap-value">${Math.floor(st.stability)}/100</span>
          </div>
          <div class="ap-progress-bg">
            <div class="ap-progress-fill" style="width:${Math.min(100,st.stability)}%;background:${st.stability>50?'#4ecf8a':'#e94560'}"></div>
          </div>
        </div>
        <div class="ap-section">
          <div class="ap-section-title">내 프로빈스 수입원</div>
          ${ProvinceManager.getFactionProvinces('고려').map(p => `
            <div class="ap-row">
              <span class="ap-label">${p.name}</span>
              <span class="ap-value">+${Math.floor(p.development * 8)}</span>

  // ── 캐릭터 패널 ──
  function openCharacters() {
    _open('👑', '인물 관리', () => {
      const ruler = CharacterManager.getRuler('고려');
      const heir = CharacterManager.getHeir('고려');
      const allChars = typeof CharacterManager.getAll === 'function'
        ? CharacterManager.getAll().filter(c => c.faction === '고려')
        : (ruler ? [ruler] : []);

      const renderChar = (c, label) => {
        if (!c) return `<div style="color:#e94560;font-size:12px;padding:6px 0">⚠ ${label} 없음</div>`;
        const stats = CharacterManager.getEffectiveStats ? CharacterManager.getEffectiveStats(c) : c.stats;
        return `
          <div style="background:#0f2040;border:1px solid #1a3a60;border-radius:6px;padding:8px;margin-bottom:8px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
              <div style="font-size:20px">👤</div>
              <div>
                <div style="font-weight:bold;font-size:13px">${c.name}</div>
                <div style="font-size:10px;color:#6080a0">${label} · ${c.age}세 · ${c.dynasty}가</div>
              </div>
            </div>
            <div style="display:flex;gap:5px;flex-wrap:wrap;font-size:10px">
              <span style="background:#0a1830;border:1px solid #1a3050;border-radius:4px;padding:1px 6px">무⚔ ${stats ? stats.martial : c.stats.martial}</span>
              <span style="background:#0a1830;border:1px solid #1a3050;border-radius:4px;padding:1px 6px">외🕊 ${stats ? stats.diplomacy : c.stats.diplomacy}</span>
              <span style="background:#0a1830;border:1px solid #1a3050;border-radius:4px;padding:1px 6px">행⚙ ${stats ? stats.stewardship : c.stats.stewardship}</span>
              <span style="background:#0a1830;border:1px solid #1a3050;border-radius:4px;padding:1px 6px">음🌑 ${stats ? stats.intrigue : c.stats.intrigue}</span>
            </div>
            ${c.traits && c.traits.length ? `<div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:3px">
              ${c.traits.map(t => `<span style="background:#1a2a40;color:#90b0d0;border:1px solid #2a4a60;border-radius:8px;padding:1px 6px;font-size:10px">${t}</span>`).join('')}
            </div>` : ''}

      };

      return `
        <div class="ap-section">
          <div class="ap-section-title">지도자</div>
          ${renderChar(ruler, '군주')}
        </div>
        <div class="ap-section">
          <div class="ap-section-title">후계자</div>
          ${renderChar(heir, '후계자')}
          ${!heir ? `<button class="ap-action-btn" onclick="ActionPanels._assignHeir()">
            <span>👑</span> 후계자 지정 (캐릭터 중 선택)
            <span class="btn-cost">필요: 위신 10</span>
          </button>` : ''}
        </div>
        <div class="ap-section">
          <div class="ap-section-title">외교 혼인</div>
          <button class="ap-action-btn" onclick="ActionPanels._openMarriage()">
            <span>💒</span> 혼인 외교 제의
            <span class="btn-cost">관계 +15</span>
          </button>
        </div>
      `;
    });
  }

  // ── 안정도 패널 ──
  function openStability() {
    _open('⚡', '안정도 관리', () => {
      const st = FactionManager.getFactionState('고려');
      if (!st) return '';
      const stab = Math.floor(st.stability);
      const stabColor = stab > 60 ? '#4ecf8a' : stab > 30 ? '#f5a623' : '#e94560';
      const eco = FactionManager.calcMonthlyIncome('고려');
      const netIncome = eco ? (eco.income - eco.expenses) : 0;
      return `
        <div class="ap-section">
          <div class="ap-section-title">현재 안정도</div>
          <div style="font-size:32px;font-weight:bold;color:${stabColor};text-align:center;padding:10px 0">${stab}</div>
          <div class="ap-progress-bg" style="height:12px;margin-bottom:12px">
            <div class="ap-progress-fill" style="width:${stab}%;background:${stabColor}"></div>
          </div>
          <div style="font-size:11px;color:#778;margin-bottom:12px">
            ${stab < 30 ? '⚠ 위험: 민란 발생 가능성이 높습니다.' : stab < 60 ? '📊 보통: 안정도를 높이는 것이 좋습니다.' : '✅ 양호: 안정적인 통치 중입니다.'}
          </div>
        </div>
        <div class="ap-section">
          <div class="ap-section-title">안정도 향상 수단</div>
          <button class="ap-action-btn" onclick="ActionPanels._stabilityBoost(30)">
            <span>🛕</span> 사원 건립 기원
            <span class="btn-cost">💰 80 → 안정+10</span>
          </button>
          <button class="ap-action-btn" onclick="ActionPanels._stabilityBoost(20)">
            <span>🎊</span> 백성 연회 개최
            <span class="btn-cost">💰 50 → 안정+7</span>
          </button>
          <button class="ap-action-btn" onclick="ActionPanels._stabilityBoost(50)">
            <span>📜</span> 세금 감면 선포
            <span class="btn-cost">💰 0 → 안정+15, 월수입-20%</span>
          </button>
        </div>
        <div class="ap-section">
          <div class="ap-section-title">안정도 하락 원인</div>
          <div class="ap-row"><span class="ap-label">재정 적자</span><span class="ap-value negative">${netIncome < 0 ? '적자 중 (-0.5/월)' : '-'}</span></div>
          <div class="ap-row"><span class="ap-label">저안정도 페널티</span><span class="ap-value negative">${st.stability < 30 ? '민란 위험' : '없음'}</span></div>
        </div>
      `;
    });
  }

  // ── 외교 패널 ──
  function openDiplomacy() {
    _open('🕊', '외교 현황', () => {
      const factions = ['북방부족', '남방', '동방', '해상세력'];
      const rows = factions.map(f => {
        const rel = FactionManager.getRelation ? FactionManager.getRelation('고려', f) : 0;
        const relColor = rel > 20 ? '#4ecf8a' : rel > -20 ? '#f5a623' : '#e94560';
        const relBar = `<div class="ap-progress-bg" style="width:60px;display:inline-block;vertical-align:middle;margin-left:6px">
          <div class="ap-progress-fill" style="width:${(rel+100)/2}%;background:${relColor}"></div>
        </div>`;
        return `
          <div class="ap-row">
            <span class="ap-label">${f}</span>
            <span class="ap-value" style="color:${relColor}">${rel > 0 ? '+' : ''}${rel} ${relBar}</span>
          </div>
        `;
      });
      const warButtons = factions.map(f => {
        const atWar = WarSystem.isAtWar('고려', f);
        if (atWar) {
          const score = WarSystem.getWarScore(
            WarSystem.getWar('고려', f) ? '고려' : f,
            WarSystem.getWar('고려', f) ? f : '고려'
          );
          const myScore    = WarSystem.getWar('고려', f) ? score.atk : score.def;
          const theirScore = WarSystem.getWar('고려', f) ? score.def : score.atk;
          const war = WarSystem.getWar('고려', f) || WarSystem.getWar(f, '고려');
          const duration = WarSystem.getCurrentMonth() - (war ? war.startMonth : 0);
          const scoreColor = myScore > theirScore ? '#4ecf8a' : myScore < theirScore ? '#e94560' : '#f5a623';
          return `
            <div style="background:#0f2040;border:1px solid #2a3a60;border-radius:6px;padding:8px;margin-bottom:8px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
                <span style="font-size:12px;font-weight:bold">⚔ vs ${f}</span>
                <span style="font-size:12px;color:${scoreColor}">${myScore} : ${theirScore}</span>
              </div>
              <div style="font-size:10px;color:#6a8aaa;margin-bottom:6px">
                목표: ${WarSystem.getGoalText(war ? war.warGoal : null)} | 경과: ${duration}개월
              </div>
              <div style="display:flex;gap:4px;margin-bottom:4px">
                <button class="ap-action-btn" style="flex:1;border-color:#4ecf8a;font-size:11px" onclick="WarSystem.offerPeace('고려','${f}',{type:'white_peace'});ActionPanels.openDiplomacy()">
                  🕊 백색강화
                </button>
                <button class="ap-action-btn" style="flex:1;font-size:11px" onclick="WarSystem.offerPeace('${f}','고려',{type:'tribute'});ActionPanels.openDiplomacy()">
                  💰 조공 강화
                </button>
              </div>
              <button class="ap-action-btn" style="font-size:11px" onclick="WarSystem.tryOccupyRandom('고려','${f}');ActionPanels.openDiplomacy()">
                🏴 프로빈스 점령 시도 (랜덤)
              </button>
            </div>
          `;
        }
        return `
          <button class="ap-action-btn" onclick="ActionPanels._sendGift('${f}')">
            <span>🎁</span> ${f}에 선물 보내기
            <span class="btn-cost">💰 40 → 관계+10</span>
          </button>
          <button class="ap-action-btn" style="border-color:#e94560" onclick="WarSystem.declareWar('고려','${f}');ActionPanels.openDiplomacy()">
            <span>⚔</span> ${f}에 전쟁 선포
            <span class="btn-cost">💰 50, 관계-30</span>
          </button>
        `;
      });

      // 조공 현황
      const tributes = WarSystem.getTributes();
      const tributeSection = tributes.length > 0 ? `
        <div class="ap-section">
          <div class="ap-section-title">💰 조공 계약</div>
          ${tributes.map(t => `
            <div class="ap-row">
              <span class="ap-label">${t.payer} → ${t.receiver}</span>
              <span class="ap-value ${t.payer === '고려' ? 'negative' : 'positive'}">${t.amount}💰 × ${t.monthsLeft}개월 남음</span>
            </div>
          `).join('')}
        </div>
      ` : '';

      // 점령지 현황
      const occs = WarSystem.getOccupations();
      const myOccs = Object.entries(occs).filter(([, o]) => o.occupiedBy === '고려');
      const enemyOccs = Object.entries(occs).filter(([pid, o]) => {
        const p = ProvinceManager.getById(pid);
        return p && p.faction === '고려' && o.occupiedBy !== '고려';
      });
      const occSection = (myOccs.length > 0 || enemyOccs.length > 0) ? `
        <div class="ap-section">
          <div class="ap-section-title">🏴 점령 현황</div>
          ${myOccs.map(([pid, o]) => {
            const p = ProvinceManager.getById(pid);
            return `<div class="ap-row">
              <span class="ap-label">점령 중: ${p ? p.name : pid}</span>
              <span class="ap-value positive">${WarSystem.getCurrentMonth() - o.since}개월째</span>
            </div>`;
          }).join('')}
          ${enemyOccs.map(([pid, o]) => {
            const p = ProvinceManager.getById(pid);
            return `<div class="ap-row">
              <span class="ap-label">점령당함: ${p ? p.name : pid}</span>
              <span class="ap-value negative">${o.occupiedBy}</span>
            </div>`;
          }).join('')}
        </div>
      ` : '';

      // 동맹 섹션
      const allyFactions = ['북방부족', '남방', '동방', '해상세력'];
      let allyHtml = `<div class="ap-section"><div class="ap-section-title">🤝 동맹 관계</div>`;
      allyFactions.forEach(f => {
        const allied = DiplomacyManager.isAlly('고려', f);
        const rel = FactionManager.getRelation ? FactionManager.getRelation('고려', f) : 0;
        if (allied) {
          allyHtml += `
            <div class="ap-row">
              <span class="ap-label">${f}</span>
              <span class="ap-value positive">동맹 중</span>
            </div>
            <button class="ap-action-btn" onclick="DiplomacyManager.breakAlliance('고려','${f}');ActionPanels.openDiplomacy()">
              💔 동맹 파기
            </button>`;
        } else {
          const canAlly = rel >= 20;
          allyHtml += `
            <div class="ap-row">
              <span class="ap-label">${f}</span>
              <span class="ap-value ${rel >= 0 ? 'positive' : 'negative'}">${rel > 0 ? '+' : ''}${rel}</span>
            </div>
            <button class="ap-action-btn" ${!canAlly ? 'disabled' : ''} onclick="DiplomacyManager.proposeAlliance('고려','${f}');ActionPanels.openDiplomacy()">
              🤝 동맹 제의 <span class="btn-cost">관계 20+ 필요</span>
            </button>`;
        }
      });
      allyHtml += '</div>';

      // 교역 협정 섹션
      const deals = DiplomacyManager.getTradeDeals();
      let dealHtml = `<div class="ap-section"><div class="ap-section-title">📦 교역 협정</div>`;
      const dealFactions = ['북방부족', '남방', '동방', '해상세력'];
      dealFactions.forEach(f => {
        const deal = deals.find(d => (d.from === '고려' && d.to === f) || (d.from === f && d.to === '고려'));
        if (deal) {
          dealHtml += `
            <div class="ap-row">
              <span class="ap-label">${f}</span>
              <span class="ap-value positive">+${deal.bonus}💰/월 (${deal.months}개월 남음)</span>
            </div>
            <button class="ap-action-btn" onclick="DiplomacyManager.cancelTradeDeal('고려','${f}');ActionPanels.openDiplomacy()">
              ❌ 협정 해지
            </button>`;
        } else {
          const rel = FactionManager.getRelation ? FactionManager.getRelation('고려', f) : 0;
          dealHtml += `
            <button class="ap-action-btn" ${rel < 0 ? 'disabled' : ''} onclick="DiplomacyManager.proposeTradeDeal('고려','${f}');ActionPanels.openDiplomacy()">
              📦 ${f} 교역 협정 <span class="btn-cost">관계 0+ 필요</span>
            </button>`;
        }
      });
      dealHtml += '</div>';

      // 종속 관계 섹션
      const vassals = DiplomacyManager.getVassals('고려');
      let vassalHtml = `<div class="ap-section"><div class="ap-section-title">👑 종속 세력</div>`;
      if (vassals.length > 0) {
        vassals.forEach(v => {
          vassalHtml += `
            <div class="ap-row">
              <span class="ap-label">${v}</span>
              <span class="ap-value">종속 중 (조공 10%/월)</span>
            </div>
            <button class="ap-action-btn" onclick="DiplomacyManager.releaseVassal('${v}');ActionPanels.openDiplomacy()">
              🆓 독립 허용
            </button>`;
        });
      } else {
        vassalHtml += `<div class="ap-row"><span class="ap-label">종속 세력 없음</span></div>`;
        const potentialVassals = ['북방부족', '남방', '동방', '해상세력'];
        potentialVassals.forEach(f => {
          if (!DiplomacyManager.isVassal(f)) {
            vassalHtml += `
              <button class="ap-action-btn" onclick="DiplomacyManager.makeVassal('고려','${f}');ActionPanels.openDiplomacy()">
                👑 ${f} 종속화 <span class="btn-cost">위신 30 필요</span>
              </button>`;
          }
        });
      }
      vassalHtml += '</div>';

      return `
        <div class="ap-section">
          <div class="ap-section-title">세력 관계도</div>
          ${rows.join('')}
        </div>
        <div class="ap-section">
          <div class="ap-section-title">외교 행동</div>
          ${warButtons.join('')}
        </div>
        ${tributeSection}
        ${occSection}
        ${allyHtml}
        ${dealHtml}
        ${vassalHtml}
      `;
    });
  }

  // ── 이벤트 패널 ──

      if (typeof EventEngine !== 'undefined' && EventEngine.getQueue) {

          <div style="background:#0f2040;border:1px solid #1a3a60;border-radius:6px;padding:10px;margin-bottom:8px">

              <span style="font-size:18px">${ev.icon||'📜'}</span>
              <span style="font-weight:bold;color:#f5a623">${ev.title}</span>
            </div>
            <div style="font-size:11px;color:#8090a0;margin-bottom:8px">${ev.desc}</div>
            ${(ev.choices||[]).map((ch, ci) => `
              <button class="ap-action-btn" onclick="if(typeof EventEngine!=='undefined')EventEngine.resolveChoice(${i},${ci});ActionPanels.openEvents()">
