  // ── 내부 액션 함수들 ──
  function _stabilityBoost(cost) {
    const st = FactionManager.getFactionState('고려');
    if (!st) return;
    if (cost > 0 && st.gold < cost) {
      Notifications.push('💰 금화가 부족합니다!', 'alert');
      return;
    }
    if (cost > 0) st.gold -= cost;
    if (cost === 30) { st.stability = Math.min(100, st.stability + 10); Notifications.push('🛕 사원 기원 — 안정도 +10', 'good'); }
    else if (cost === 20) { st.stability = Math.min(100, st.stability + 7); Notifications.push('🎊 연회 개최 — 안정도 +7', 'good'); }
    else if (cost === 50) { st.stability = Math.min(100, st.stability + 15); Notifications.push('📜 세금 감면 — 안정도 +15', 'good'); }
    refresh();
    AlertSystem.refresh();
  }

  function _sendGift(targetFaction) {
    const st = FactionManager.getFactionState('고려');
    if (!st || st.gold < 40) { Notifications.push('💰 금화 40이 필요합니다!', 'alert'); return; }
    st.gold -= 40;
    if (FactionManager.modRelation) FactionManager.modRelation('고려', targetFaction, 10);
    Notifications.push(`🎁 ${targetFaction}에 선물을 보냈습니다 (관계 +10)`, 'good');
    refresh();
    AlertSystem.refresh();
  }

  function _assignHeir() {
    const ruler = CharacterManager.getRuler('고려');
    if (!ruler) return;
    const candidates = typeof CharacterManager.getAll === 'function'
      ? CharacterManager.getAll().filter(c => c.faction === '고려' && c.id !== ruler.id && c.role !== 'heir')
      : [];
    if (candidates.length === 0) { Notifications.push('후계자로 지정할 인물이 없습니다', 'warn'); return; }
    candidates[0].role = 'heir';
    Notifications.push(`👑 ${candidates[0].name} 님을 후계자로 지정했습니다`, 'good');
    refresh();
    AlertSystem.refresh();
  }

  function _openMarriage() {
    Notifications.push('💒 혼인 외교 기능 — 다음 업데이트에서 구현 예정', 'warn');
  }

  // ── 교역로 패널 ──
  function openTrade() {
    _open('🛤', '교역로 관리', () => {
      const routes = TradeRouteManager.getRoutes();
      const fst = FactionManager.getFactionState('고려');
      const gold = fst ? Math.floor(fst.gold) : 0;
      let html = `<div class="ap-section">
        <div class="ap-section-title">월 교역 수익</div>
        <div class="ap-row"><span class="ap-label">총 예상 수익</span>
          <span class="ap-value positive">+${TradeRouteManager.calcMonthlyIncome()}💰/월</span></div>
        <div class="ap-row"><span class="ap-label">보유 금화</span>
          <span class="ap-value">${gold}💰</span></div>
      </div>
      <div class="ap-section"><div class="ap-section-title">교역로 목록</div>`;
      for (const r of routes) {
        const stLabel = r.blocked ? '⚔차단' : r.active ? '✅운영 중' : '⛔미개설';
        const stClass = r.blocked ? 'negative' : r.active ? 'positive' : '';
        html += `<div class="ap-row">
          <span class="ap-label">${r.name}<br><small style="color:#6a8aaa">${r.goods} → ${r.to}</small></span>
          <span class="ap-value ${stClass}">${stLabel}</span>
        </div>`;
        if (!r.active && !r.blocked) {
          html += `<button class="ap-action-btn" onclick="TradeRouteManager.openRoute('${r.id}');ActionPanels.openTrade()"
            ${gold < 50 ? 'disabled' : ''}>
            <span>🛤</span> 개설 <span class="btn-cost">💰50</span>
          </button>`;
        } else if (r.active && !r.blocked) {
          html += `<button class="ap-action-btn" onclick="TradeRouteManager.closeRoute('${r.id}');ActionPanels.openTrade()">
            <span>🚫</span> 폐쇄
          </button>`;
        }
        if (r.active) {
          html += `<div style="font-size:10px;color:#6a8aaa;margin-bottom:6px">
            누적 수익: ${r.totalEarned}💰 / ${r.monthsActive}개월 운영
          </div>`;
        }
      }
      html += '</div>';
      return html;
    });
  }

  return { openEconomy, openCharacters, openStability, openDiplomacy, openEvents, openProvinceList, openTrade, close, refresh, _stabilityBoost, _sendGift, _assignHeir, _openMarriage };
})();

/* ════════════════════════════════════════════════════════
   WarSystem — M08 전쟁 목표 + 영토 점령 + 강화조약
════════════════════════════════════════════════════════ */
const WarSystem = (() => {
  "use strict";

  // ── 밸런스 상수 ──
  const WAR_COST                   = 50;   // 전쟁 선포 금화 비용
  const BASE_MILITARY_POWER        = 100;  // 기본 군사력 (가산)
  const OCCUPATION_THRESHOLD       = 0.7;  // 점령 성공 군사력 비율 (공격 > 방어 × 70%)
  const TRIBUTE_AMOUNT             = 20;   // 조공 강화 월 지급액
  const TRIBUTE_DURATION_MONTHS    = 6;    // 조공 강화 지속 개월
  const AUTOPEACE_SCORE_THRESHOLD  = 50;   // AI 자동 강화 점수 차이 기준
  const AUTOPEACE_DURATION_MONTHS  = 12;   // AI 자동 백색강화 최대 전쟁 기간
  const OCCUPATION_INCOME_MULT     = 4;    // 점령지 수입 계수 (개발도 × n)

  // 진행 중인 전쟁: { id, attacker, defender, warGoal, startMonth, battleWins:{atk,def} }
  const _wars = [];
  // 점령 상태: { provinceId → { occupiedBy, since } }
  const _occupations = {};
  // 조공 계약: [{ payer, receiver, amount, monthsLeft }]
  const _tributes = [];

  let _currentMonth = 0;

  function _warId(a, d) { return `${a}:${d}`; }

  function _goalText(g) {
    if (!g) return '조공';
    if (g.type === 'annex')    return '합병';
    if (g.type === 'tribute')  return '조공';
    if (g.type === 'province') return `프로빈스 ${g.targetProvinceId || '?'} 할양`;
    return g.type;
  }

  // ── 전쟁 선포 ──
  function declareWar(attacker, defender, warGoal) {
    warGoal = warGoal || { type: 'tribute' };
    if (isAtWar(attacker, defender)) return false;

    const atkSt = FactionManager.getFactionState(attacker);
    if (!atkSt || atkSt.gold < WAR_COST) {
      Notifications.push(`⚔ 전쟁 선포 불가: 금화 부족 (${WAR_COST} 필요)`, 'alert');
      return false;
    }
    FactionManager.addGold(attacker, -WAR_COST);
    FactionManager.modRelation(attacker, defender, -30);

    _wars.push({
      id: _warId(attacker, defender),
      attacker, defender, warGoal,
      startMonth: _currentMonth,
      battleWins: { atk: 0, def: 0 },
    });

    Notifications.push(`⚔ ${attacker} → ${defender} 전쟁 선포! (목표: ${_goalText(warGoal)})`, 'alert');
    if (typeof AlertSystem !== 'undefined') AlertSystem.refresh();

    // 교역로 차단
    if (typeof TradeRouteManager !== 'undefined') {
      TradeRouteManager.getRoutes().forEach(r => {
        if ((r.from === attacker && r.to === defender) || (r.from === defender && r.to === attacker))
          TradeRouteManager.blockRoute && TradeRouteManager.blockRoute(r.id);
      });
    }
    return true;
  }

  // ── 군사력 계산 헬퍼 ──
  function _calcMilitaryPower(faction, specificProvinceId) {
    if (typeof MilitaryManager === 'undefined' || !MilitaryManager.getGarrisonPower) return BASE_MILITARY_POWER;
    if (specificProvinceId) return MilitaryManager.getGarrisonPower(specificProvinceId) + BASE_MILITARY_POWER;
    return ProvinceManager.getFactionProvinces(faction).reduce(
      (sum, p) => sum + MilitaryManager.getGarrisonPower(p.id), 0
    ) + BASE_MILITARY_POWER;
  }

  // ── 점령 시도 (세력 기반) ──
  function tryOccupy(attackerFaction, provinceId) {
    const province = ProvinceManager.getById(provinceId);
    if (!province) return false;
    const defender = province.faction;
    if (!isAtWar(attackerFaction, defender)) return false;
    if (_occupations[provinceId] && _occupations[provinceId].occupiedBy === attackerFaction) return false;

    const atkMil = _calcMilitaryPower(attackerFaction, null);
    const defMil = _calcMilitaryPower(defender, provinceId);

    if (atkMil > defMil * OCCUPATION_THRESHOLD) {
      _occupations[provinceId] = { occupiedBy: attackerFaction, since: _currentMonth };
      const war = getWar(attackerFaction, defender) || getWar(defender, attackerFaction);
      if (war) {
        if (war.attacker === attackerFaction) war.battleWins.atk++;
        else war.battleWins.def++;
      }
      Notifications.push(`🏴 ${attackerFaction}: ${province.name} 점령 성공!`, 'good');
      if (typeof MapRenderer !== 'undefined' && MapRenderer.markDirty) MapRenderer.markDirty();
      if (typeof AlertSystem !== 'undefined') AlertSystem.refresh();
      return true;
    } else {
      // 방어 성공: province 소유 세력의 전투 승리 기록
      const war = getWar(attackerFaction, defender) || getWar(defender, attackerFaction);
      if (war) {
        if (war.defender === defender) war.battleWins.def++;
        else war.battleWins.atk++;
      }
      Notifications.push(`🛡 ${province.name} 점령 실패 (방어 성공)`, '');
      return false;
    }
  }

  // ── 랜덤 프로빈스 점령 시도 (UI 헬퍼) ──
  function tryOccupyRandom(attackerFaction, defenderFaction) {
    const provs = ProvinceManager.getFactionProvinces(defenderFaction);
    if (!provs.length) return false;
    const p = provs[Math.floor(Math.random() * provs.length)];
    return tryOccupy(attackerFaction, p.id);
  }

  // ── 전쟁 점수 ──
  function getWarScore(attackerFaction, defenderFaction) {
    const war = getWar(attackerFaction, defenderFaction);
    if (!war) return { atk: 0, def: 0 };
    const atkOccupied = Object.values(_occupations).filter(o => o.occupiedBy === attackerFaction).length;
    const defOccupied = Object.values(_occupations).filter(o => o.occupiedBy === defenderFaction).length;
    return {
      atk: atkOccupied * 10 + (war.battleWins.atk || 0) * 5,
      def: defOccupied * 10 + (war.battleWins.def || 0) * 5,
    };
  }

  // ── 강화조약 ──
  function offerPeace(from, to, terms) {
    terms = terms || { type: 'white_peace' };
    const war = getWar(from, to) || getWar(to, from);
    if (!war) return false;

    _removeWar(from, to);

    if (terms.type === 'white_peace') {
      _returnOccupied(from, to);
      FactionManager.modRelation(from, to, 10);
      Notifications.push(`🕊 ${from} ↔ ${to} 백색 강화 체결`, 'good');
    } else if (terms.type === 'tribute') {
      _returnOccupied(from, to);
      _tributes.push({ payer: from, receiver: to, amount: TRIBUTE_AMOUNT, monthsLeft: TRIBUTE_DURATION_MONTHS });
      FactionManager.modRelation(to, from, -20);
      Notifications.push(`💰 ${from} → ${to} 조공 강화 (${TRIBUTE_DURATION_MONTHS}개월, ${TRIBUTE_AMOUNT}💰/월)`, 'good');
    } else if (terms.type === 'annexation') {
      // 승자(to)가 점령 중인 패자(from) 소유 프로빈스를 영구 할양
      const provinces = terms.provinces || Object.keys(_occupations).filter(pid => {
        const p = ProvinceManager.getById(pid);
        return _occupations[pid] && _occupations[pid].occupiedBy === to && p && p.faction === from;
      });
      provinces.forEach(pid => {
        const p = ProvinceManager.getById(pid);
        if (p) {
          p.faction = to;
          delete _occupations[pid];
        }
      });
      FactionManager.modRelation(from, to, -50);
      Notifications.push(`🏴 ${from}: ${provinces.length}개 프로빈스 할양 → ${to}`, 'alert');
      if (typeof MapRenderer !== 'undefined' && MapRenderer.markDirty) MapRenderer.markDirty();
    }

    if (typeof AlertSystem !== 'undefined') AlertSystem.refresh();
    return true;
  }

  function makePeace(a, b) { return offerPeace(a, b, { type: 'white_peace' }); }

  function _returnOccupied(a, b) {
    Object.keys(_occupations).forEach(pid => {
      const o = _occupations[pid];
      if (o.occupiedBy === a || o.occupiedBy === b) delete _occupations[pid];
    });
  }

  function _removeWar(a, b) {
    const idx = _wars.findIndex(w =>
      (w.attacker === a && w.defender === b) || (w.attacker === b && w.defender === a));
    if (idx !== -1) _wars.splice(idx, 1);
  }

  // ── AI 자동 강화 ──
  function checkAutopeace() {
    [..._wars].forEach(w => {
      const score = getWarScore(w.attacker, w.defender);
      if (score.atk - score.def > AUTOPEACE_SCORE_THRESHOLD) {
        offerPeace(w.defender, w.attacker, { type: 'tribute' });
      } else if (score.def - score.atk > AUTOPEACE_SCORE_THRESHOLD) {
        offerPeace(w.attacker, w.defender, { type: 'tribute' });
      } else {
        const duration = _currentMonth - w.startMonth;
        if (duration > AUTOPEACE_DURATION_MONTHS) offerPeace(w.attacker, w.defender, { type: 'white_peace' });
      }
    });
  }

  // ── 조공 월별 처리 ──
  function processTributes() {
    for (let i = _tributes.length - 1; i >= 0; i--) {
      const t = _tributes[i];
      if (t.monthsLeft <= 0) { _tributes.splice(i, 1); continue; }
      FactionManager.addGold(t.payer, -t.amount);
      FactionManager.addGold(t.receiver, t.amount);
      t.monthsLeft--;
      if (t.monthsLeft === 0)
        Notifications.push(`✅ ${t.payer} → ${t.receiver} 조공 완료`, 'good');
    }
  }

  // ── 점령지 수입 처리 ──
  function processOccupationIncome() {
    Object.entries(_occupations).forEach(([pid, occ]) => {
      const p = ProvinceManager.getById(pid);
      if (!p) return;
      const income = Math.floor((p.development || 1) * OCCUPATION_INCOME_MULT);
      FactionManager.addGold(occ.occupiedBy, income);
    });
  }

  // ── 월별 종합 처리 ──
  function onMonthTick(month) {
    if (month !== undefined) _currentMonth = month;
    processTributes();
    processOccupationIncome();
    checkAutopeace();
  }

  function getWar(a, b) {
    return _wars.find(w => w.attacker === a && w.defender === b);
  }

  function isAtWar(a, b) {
    return _wars.some(w =>
      (w.attacker === a && w.defender === b) || (w.attacker === b && w.defender === a));
  }

  function getWars()       { return [..._wars]; }
  function getActiveWars() { return [..._wars]; } // 하위 호환
  function getOccupations() { return { ..._occupations }; }
  function getTributes()    { return [..._tributes]; }
  function getCurrentMonth() { return _currentMonth; }
  function getGoalText(g)    { return _goalText(g); }

  return {
    declareWar, tryOccupy, tryOccupyRandom, getWarScore, offerPeace, makePeace,
    checkAutopeace, onMonthTick, isAtWar, getWar, getWars, getActiveWars,
    getOccupations, getTributes, getCurrentMonth, getGoalText,
  };
})();

/* ════════════════════════════════════════════════════════
   M10 — TRADE ROUTE MANAGER
   교역로 시스템: 세력 간 교역로 생성·관리, 월별 수익 계산
════════════════════════════════════════════════════════ */
const TradeRouteManager = (() => {
  'use strict';

  // 교역로 정의: 한반도 지리 기반 실제 교역 경로
  const ROUTE_DEFS = [
    { id: 'silk_road_east',  name: '동방 실크로드', from: '고려', to: '동방',   goods: '비단',   baseGold: 18, basePower: 0 },
    { id: 'northern_fur',    name: '북방 모피로',   from: '고려', to: '북방부족', goods: '모피',  baseGold: 12, basePower: 0 },
    { id: 'southern_spice',  name: '남방 향신료로', from: '고려', to: '남방',   goods: '향신료', baseGold: 15, basePower: 0 },
    { id: 'sea_trade',       name: '해상 교역로',  from: '고려', to: '해상세력', goods: '도자기', baseGold: 20, basePower: 0 },
    { id: 'inner_market',    name: '내륙 교역로',  from: '고려', to: '고려',   goods: '곡물',   baseGold:  8, basePower: 0 },
  ];

  // 활성화된 교역로 상태: { routeId → { active, blocked, monthsActive, totalEarned } }
  const _state = {};

  function init() {
    for (const r of ROUTE_DEFS) {
      _state[r.id] = { active: false, blocked: false, monthsActive: 0, totalEarned: 0 };
    }
    // 내륙 교역로는 기본 활성화
    _state['inner_market'].active = true;
  }

  // 교역로 활성화 (금화 50 비용)
  function openRoute(routeId) {
    const route = ROUTE_DEFS.find(r => r.id === routeId);
    if (!route) return false;
    const st = _state[routeId];
    if (st.active) return false;

    const faction = FactionManager.getFactionState('고려');
    if (!faction || faction.gold < 50) return false;

    FactionManager.addGold('고려', -50);
    st.active = true;
    st.blocked = false;

    if (typeof Notifications !== 'undefined') {
      Notifications.push(`🛤 교역로 개설: ${route.name} (+${route.baseGold}💰/월)`);
    }
    return true;
  }

  // 교역로 폐쇄
  function closeRoute(routeId) {
    const st = _state[routeId];
    if (!st) return;
    st.active = false;
    const route = ROUTE_DEFS.find(r => r.id === routeId);
    if (route && typeof Notifications !== 'undefined') {
      Notifications.push(`🚫 교역로 폐쇄: ${route.name}`);
    }
  }

  // 월별 수익 계산 및 적용
  function onMonthTick() {
    let totalIncome = 0;
    for (const route of ROUTE_DEFS) {
      const st = _state[route.id];
      if (!st.active || st.blocked) continue;

      // 관계도 보너스: 상대 세력과 관계가 좋을수록 수익 증가
      let multiplier = 1.0;
      if (route.to !== '고려' && typeof FactionManager.getRelation === 'function') {
        const rel = FactionManager.getRelation('고려', route.to);
        if (rel > 50)  multiplier = 1.5;
        else if (rel > 25) multiplier = 1.25;
        else if (rel < -25) multiplier = 0.5;
        else if (rel < 0)   multiplier = 0.75;
      }

      // 전쟁 중이면 교역로 차단
      if (route.to !== '고려' && typeof WarSystem !== 'undefined' && WarSystem.isAtWar && WarSystem.isAtWar('고려', route.to)) {
        st.blocked = true;
        if (typeof Notifications !== 'undefined') {
          Notifications.push(`⚔ 교역로 차단: ${route.name} (전쟁 중)`);
        }
        continue;
      } else {
        st.blocked = false;
      }

      const income = Math.floor(route.baseGold * multiplier);
      FactionManager.addGold('고려', income);
      st.monthsActive++;
      st.totalEarned += income;
      totalIncome += income;
    }
    return totalIncome;
  }

  // 교역로 차단 (전쟁 이벤트 등에서 외부 호출)
  function blockRoute(routeId) {
    if (_state[routeId]) _state[routeId].blocked = true;
  }

  function getRoutes() {
    return ROUTE_DEFS.map(r => ({ ...r, ...(_state[r.id] || {}) }));
  }

  function getState(routeId) { return _state[routeId]; }

  function calcMonthlyIncome() {
    let total = 0;
    for (const r of ROUTE_DEFS) {
      const st = _state[r.id];
      if (st && st.active && !st.blocked) total += r.baseGold;
    }
    return total;
  }

  return { init, openRoute, closeRoute, onMonthTick, blockRoute, getRoutes, getState, calcMonthlyIncome };
})();

// ═══════════════════════════════════════════════════════
//  DiplomacyManager — M11 외교 고도화
// ═══════════════════════════════════════════════════════
const DiplomacyManager = (() => {
  'use strict';

  // ── 동맹 ──────────────────────────────────────────────
  // _alliances: Set of "factionA:factionB" (정렬된 쌍)
  const _alliances = new Set();

  function _allyKey(a, b) {
    return [a, b].sort().join(':');
  }

  function proposeAlliance(from, to) {
    const rel = FactionManager.getRelation ? FactionManager.getRelation(from, to) : 0;
    if (rel < 20) {
      Notifications.push(`🤝 동맹 제의 실패: ${from} ↔ ${to} 관계도 부족 (현재 ${rel}, 필요 20+)`, 'warn');
      return false;
    }
    if (_alliances.has(_allyKey(from, to))) {
      Notifications.push(`이미 동맹 관계입니다`, 'warn');
      return false;
    }
    _alliances.add(_allyKey(from, to));
    if (FactionManager.modRelation) FactionManager.modRelation(from, to, 10);
    Notifications.push(`🤝 ${from} ↔ ${to} 동맹 체결!`, 'good');
    return true;
  }

  function breakAlliance(from, to) {
    if (!_alliances.has(_allyKey(from, to))) return false;
    _alliances.delete(_allyKey(from, to));
    if (FactionManager.modRelation) FactionManager.modRelation(from, to, -25);
    Notifications.push(`💔 ${from} ↔ ${to} 동맹 파기`, 'warn');
    return true;
  }

  function isAlly(a, b) {
    return _alliances.has(_allyKey(a, b));
  }

  function getAlliances() {
    return [..._alliances];
  }

  // ── 종속 관계 ──────────────────────────────────────────
  // _vassals: Map<vassal → liege>
  const _vassals = new Map();

  function makeVassal(liege, vassal) {
    if (_vassals.has(vassal)) {
      Notifications.push(`${vassal}은 이미 종속 세력입니다`, 'warn');
      return false;
    }
    const liegeSt = FactionManager.getFactionState(liege);
    if (!liegeSt || (liegeSt.prestige || 0) < 30) {
      Notifications.push(`종속화 실패: 위신 30 이상 필요`, 'warn');
      return false;
    }
    liegeSt.prestige = (liegeSt.prestige || 0) - 30;
    _vassals.set(vassal, liege);
    if (FactionManager.modRelation) FactionManager.modRelation(liege, vassal, -15);
    Notifications.push(`👑 ${vassal} → ${liege} 종속화 완료`, 'good');
    return true;
  }

  function releaseVassal(vassal) {
    if (!_vassals.has(vassal)) return false;
    const liege = _vassals.get(vassal);
    _vassals.delete(vassal);
    if (FactionManager.modRelation) FactionManager.modRelation(liege, vassal, 20);
    Notifications.push(`🆓 ${vassal} 독립 (전 종주: ${liege})`, 'good');
    return true;
  }

  function getLiege(vassal) { return _vassals.get(vassal) || null; }
  function getVassals(liege) {
    return [..._vassals.entries()].filter(([, l]) => l === liege).map(([v]) => v);
  }
  function isVassal(vassal) { return _vassals.has(vassal); }

  // ── 종속 조공 월별 처리 ──────────────────────────────────
  function processVassalTribute() {
    _vassals.forEach((liege, vassal) => {
      const vassalSt = FactionManager.getFactionState(vassal);
      if (!vassalSt) return;
      const tribute = Math.floor((vassalSt.gold || 0) * 0.1); // 금고의 10%
      if (tribute > 0) {
        vassalSt.gold = (vassalSt.gold || 0) - tribute;
        const liegeSt = FactionManager.getFactionState(liege);
        if (liegeSt) liegeSt.gold = (liegeSt.gold || 0) + tribute;
      }
    });
  }

  // ── 교역 협정 ──────────────────────────────────────────
  // _tradeDeals: [{ id, from, to, bonus, months }]
  const _tradeDeals = [];
  let _tdIdCounter = 1;

  function proposeTradeDeal(from, to) {
    const rel = FactionManager.getRelation ? FactionManager.getRelation(from, to) : 0;
    if (rel < 0) {
      Notifications.push(`교역 협정 실패: 관계도 0 이상 필요 (현재 ${rel})`, 'warn');
      return false;
    }
    const existing = _tradeDeals.find(d =>
      (d.from === from && d.to === to) || (d.from === to && d.to === from));
    if (existing) {
      Notifications.push(`이미 교역 협정이 있습니다`, 'warn');
      return false;
    }
    _tradeDeals.push({ id: _tdIdCounter++, from, to, bonus: 15, months: 12 });
    if (FactionManager.modRelation) FactionManager.modRelation(from, to, 5);
    Notifications.push(`📦 ${from} ↔ ${to} 교역 협정 체결 (12개월, +15💰/월)`, 'good');
    return true;
  }

  function cancelTradeDeal(from, to) {
    const idx = _tradeDeals.findIndex(d =>
      (d.from === from && d.to === to) || (d.from === to && d.to === from));
    if (idx === -1) return false;
    _tradeDeals.splice(idx, 1);
    if (FactionManager.modRelation) FactionManager.modRelation(from, to, -10);
    Notifications.push(`❌ ${from} ↔ ${to} 교역 협정 해지`, 'warn');
    return true;
  }

  function processTradeDeals() {
    for (let i = _tradeDeals.length - 1; i >= 0; i--) {
      const deal = _tradeDeals[i];
      const fromSt = FactionManager.getFactionState(deal.from);
      const toSt = FactionManager.getFactionState(deal.to);
      if (fromSt) fromSt.gold = (fromSt.gold || 0) + deal.bonus;
      if (toSt) toSt.gold = (toSt.gold || 0) + deal.bonus;
      deal.months--;
      if (deal.months <= 0) {
        _tradeDeals.splice(i, 1);
        Notifications.push(`📦 ${deal.from} ↔ ${deal.to} 교역 협정 만료`, 'warn');
      }
    }
  }

  function getTradeDeals() { return [..._tradeDeals]; }

  // ── 관계도 자동 회복/악화 ──────────────────────────────
  function processRelationDrift() {
    const factions = ['고려', '북방부족', '남방', '동방', '해상세력'];
    for (let i = 0; i < factions.length; i++) {
      for (let j = i + 1; j < factions.length; j++) {
        if (typeof FactionManager.getRelation !== 'function') continue;
        const rel = FactionManager.getRelation(factions[i], factions[j]);
        if (rel > 0 && rel < 100) {
          FactionManager.modRelation(factions[i], factions[j], -1); // 자연 감소
        } else if (rel < 0 && rel > -100) {
          FactionManager.modRelation(factions[i], factions[j], 1); // 자연 회복
        }
      }
    }
  }

  // ── 월별 통합 처리 ──────────────────────────────────────
  function onMonthTick() {
    processVassalTribute();
    processTradeDeals();
    processRelationDrift();
  }

  return {
    proposeAlliance, breakAlliance, isAlly, getAlliances,
    makeVassal, releaseVassal, getLiege, getVassals, isVassal,
    proposeTradeDeal, cancelTradeDeal, getTradeDeals,
    onMonthTick,
  };
})();

window.addEventListener('load', () => {
  MapRenderer.init();
  Notifications.init();
  GameCore.start();
  TradeRouteManager.init();

  // 타임바
  GameCore.on('tick',     s  => TimeBar.update(s));
  TimeBar.update(GameCore.getState());

  // M04: 매월 경제 틱
  GameCore.on('newMonth', () => {
    FactionManager.onMonthTick();
    EconomyEngine.onMonthTick();
    EventEngine.checkEvents();
    TradeRouteManager.onMonthTick();
    WarSystem.onMonthTick(GameCore.getState().month);
    DiplomacyManager.onMonthTick();
    AlertSystem.refresh();
    updateResourceBar();
    const el = document.getElementById('trade-income-display');
    if (el) el.textContent = `🛤 +${TradeRouteManager.calcMonthlyIncome()}/월`;
  });
  // M05: 매년 캐릭터 나이 진행
  GameCore.on('newYear',  s  => {
    CharacterManager.onYearTick();
    Notifications.push(`📅 ${s.year}년이 시작되었습니다`);
  });

  // M06: 매틱 사단 이동, 매월 유지비
  GameCore.on('tick',     () => MilitaryManager.onTick());
  GameCore.on('newMonth', () => MilitaryManager.onMonthUpkeep());
  // M07+: 전투 시작 → BattleManager로 라우팅 (다중 일수 전투)
  GameCore.on('battleStart', data => BattleManager.startBattle(data));
  // BattleManager 매틱 진행 + BattleOverlay 갱신
  GameCore.on('tick', () => { BattleManager.onTick(); BattleOverlay.update(); });

  // 초기 경제 계산
  FactionManager.onMonthTick();
  // EconomyEngine 초기화
  EconomyEngine.onMonthTick();
  updateResourceBar();
  const tradeEl = document.getElementById('trade-income-display');
  if (tradeEl) tradeEl.textContent = `🛤 +${TradeRouteManager.calcMonthlyIncome()}/월`;

  // 미니맵 초기화
  MinimapRenderer.init();
  GameCore.on('tick', () => MinimapRenderer.update());

  // 테스트용 초기 전투 생성 (Phase 4 데모)
  // 1. 한성 전투: 고려(공격) vs 북방부족(방어) — 2일째 진행 중
  BattleManager.createTestBattle({
    provinceId:    6,
    attackFaction: '고려',
    defendFaction: '북방부족',
    type:          'battle',
    day:           2,
    atkUnits:      { infantry:8000, cavalry:2000, archers:2000, siege:0 },
    defUnits:      { infantry:6000, cavalry:2000, archers:500,  siege:0 },
  });
  // 2. 서경 공성전: 북방부족(공격) vs 서방상인(방어) — 공성 45% 진행
  BattleManager.createTestBattle({
    provinceId:    5,
    attackFaction: '북방부족',
    defendFaction: '서방상인',
    type:          'siege',
    day:           5,
    siegePct:      45,
    atkUnits:      { infantry:8000, cavalry:2000, archers:2000, siege:0 },
    defUnits:      { infantry:3000, cavalry:1000, archers:1000, siege:0 },
  });
  BattleOverlay.update();

  // ▶ 원클릭 시작 버튼
  document.getElementById('oneclick-start-btn').addEventListener('click', function () {
    if (GameCore.getState().paused) GameCore.togglePause();
    GameCore.setSpeed(2);
    MilitaryManager.initGarrison();
    MilitaryManager.initAIDivisions();
    this.textContent = '▶ 진행중';
    this.disabled = true;
    Notifications.push('⚔ 전략 시뮬레이션 시작!', 'good');
    MapRenderer.markDirty();
  });

  // 초기 세력 패널
  setTimeout(() => UI.showFactionPanel(), 100);

  // AlertSystem — 매 5초 + 매월 갱신
  GameCore.on('newMonth', () => AlertSystem.refresh());
  setInterval(() => AlertSystem.refresh(), 5000);
  setTimeout(() => AlertSystem.refresh(), 1500);
});
</script>

      <span id="action-panel-icon"></span>
      <span id="action-panel-title"></span>
      <button id="action-panel-close" onclick="ActionPanels.close()">✕</button>
    </div>

</div>
