<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대전략 시뮬레이션 — 프로토타입 Phase 1</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── 상단 바 ── */
  #topbar {
    background: #16213e;
    border-bottom: 2px solid #0f3460;
    height: 48px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 16px;
    flex-shrink: 0;
    user-select: none;
  }
  #game-title {
    font-size: 15px;
    font-weight: bold;
    color: #e94560;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  #date-display {
    background: #0f3460;
    padding: 4px 14px;
    border-radius: 4px;
    font-size: 15px;
    font-weight: bold;
    color: #f5a623;
    min-width: 140px;
    text-align: center;
    border: 1px solid #e94560;
  }
  .ctrl-group {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .ctrl-btn {
    background: #0f3460;
    border: 1px solid #1a4a7a;
    color: #c0c0d0;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
    font-family: inherit;
  }
  .ctrl-btn:hover { background: #1a5590; color: #fff; }
  .ctrl-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
  #pause-btn {
    background: #7b2d00;
    border-color: #e94560;
    color: #fff;
    font-size: 16px;
    padding: 4px 14px;
  }
  #pause-btn:hover { background: #a03a00; }
  #pause-btn.paused { background: #1a7b3c; border-color: #2ecc71; }

  .topbar-right {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  #map-mode-label {
    color: #888;
    font-size: 12px;
  }

  /* ── 메인 레이아웃 ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── 캔버스 영역 ── */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #0a0a1a;
    cursor: crosshair;
  }
  #gameCanvas {
    display: block;
  }
  #map-tooltip {
    position: absolute;
    background: rgba(15,52,96,0.92);
    border: 1px solid #e94560;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 12px;
    color: #f0f0f0;
    pointer-events: none;
    display: none;
    white-space: nowrap;
    z-index: 10;
  }

  /* ── 사이드패널 ── */
  #sidebar {
    width: 300px;
    background: #16213e;
    border-left: 2px solid #0f3460;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  #sidebar-header {
    background: #0f3460;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: bold;
    color: #f5a623;
    border-bottom: 1px solid #1a4a7a;
    min-height: 40px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #sidebar-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  #sidebar-body::-webkit-scrollbar { width: 4px; }
  #sidebar-body::-webkit-scrollbar-track { background: #16213e; }
  #sidebar-body::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

  .info-section {
    margin-bottom: 14px;
  }
  .info-section h4 {
    color: #f5a623;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    border-bottom: 1px solid #1a4a7a;
    padding-bottom: 3px;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    border-bottom: 1px solid #1a2a44;
    font-size: 12px;
  }
  .info-row .label { color: #8090a0; }
  .info-row .value { color: #e0e8f0; font-weight: bold; }

  .terrain-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: bold;
  }
  .resource-tag {
    display: inline-block;
    background: #0f3460;
    border: 1px solid #1a5590;
    border-radius: 3px;
    padding: 2px 7px;
    font-size: 11px;
    margin: 2px 2px 2px 0;
    color: #c0d8f0;
  }
  .faction-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }

  /* 건물 목록 */
  .building-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 0;
    font-size: 12px;
    color: #b0c4d8;
  }
  .building-icon { font-size: 14px; }

  /* 세력 목록 */
  #faction-list {
    padding: 8px 0;
  }
  .faction-item {
    display: flex;
    align-items: center;
    padding: 5px 8px;
    border-radius: 4px;
    margin-bottom: 4px;
    background: #0f2040;
    border: 1px solid #1a3a60;
    cursor: pointer;
    transition: background 0.1s;
  }
  .faction-item:hover { background: #1a3a60; }
  .faction-color-bar {
    width: 4px;
    height: 30px;
    border-radius: 2px;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .faction-info { flex: 1; }
  .faction-name { font-weight: bold; font-size: 12px; }
  .faction-stats { font-size: 11px; color: #8090a0; margin-top: 1px; }

  /* 하단 상태바 */
  #statusbar {
    background: #0f1a2e;
    border-top: 1px solid #0f3460;
    height: 24px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 20px;
    font-size: 11px;
    color: #6080a0;
    flex-shrink: 0;
  }
  #statusbar span { color: #a0b8d0; }

  /* 맵 모드 탭 */
  .map-mode-btn {
    background: #0a1a30;
    border: 1px solid #1a3a5a;
    color: #8090a0;
    padding: 3px 10px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .map-mode-btn:hover { color: #c0d0e0; border-color: #3a6a9a; }
  .map-mode-btn.active { background: #1a4a7a; color: #fff; border-color: #5a9aca; }

  /* 빈 패널 안내 */
  #empty-hint {
    text-align: center;
    color: #3a5070;
    padding: 40px 20px;
    font-size: 13px;
    line-height: 1.8;
  }
  #empty-hint .hint-icon { font-size: 36px; display: block; margin-bottom: 10px; }

  /* progress 링크 버튼 */
  #progress-link {
    background: #2d1a5e;
    border: 1px solid #7b52cf;
    color: #c0a0ff;
    padding: 5px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    text-decoration: none;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s;
  }
  #progress-link:hover { background: #3d2a7e; color: #fff; }

  /* 애니메이션 */
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .pulsing { animation: pulse 1s infinite; }
  @keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position:  200% center; }
  }

  /* ── 타임바 ── */
  #timebar {
    background: #0c1428;
    border-bottom: 1px solid #0f3460;
    height: 36px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 6px;
    flex-shrink: 0;
    user-select: none;
    overflow: hidden;
  }
  #timebar-label {
    font-size: 10px;
    color: #445;
    white-space: nowrap;
    min-width: 28px;
  }
  #month-track {
    display: flex;
    flex: 1;
    gap: 2px;
    height: 22px;
  }
  .month-cell {
    flex: 1;
    border-radius: 3px;
    position: relative;
    overflow: hidden;
    cursor: default;
    min-width: 0;
    border: 1px solid rgba(0,0,0,0.3);
  }
  .month-cell-bg {
    position: absolute; inset: 0;
    opacity: 0.18;
  }
  .month-cell-fill {
    position: absolute; top:0; left:0; bottom:0;
    width: 0%;
    transition: width 0.4s ease;
  }
  .month-cell-label {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
    font-weight: bold;
    color: rgba(255,255,255,0.7);
    z-index: 2;
    pointer-events: none;
  }
  .month-cell.current .month-cell-label { color: #fff; font-size: 10px; }
  .month-cell.past .month-cell-fill { opacity: 0.6; }
  .month-cell.current .month-cell-fill {
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(255,255,255,0.25) 50%,
      transparent 100%);
    background-size: 200% auto;
    animation: shimmer 1.5s linear infinite;
  }
  /* 계절 색상 */
  .season-winter .month-cell-bg,
  .season-winter.past .month-cell-fill  { background: #7cb8e8; }
  .season-winter.current .month-cell-fill { background: #7cb8e8; }
  .season-spring .month-cell-bg,
  .season-spring.past .month-cell-fill  { background: #7ec87a; }
  .season-spring.current .month-cell-fill { background: #7ec87a; }
  .season-summer .month-cell-bg,
  .season-summer.past .month-cell-fill  { background: #f5c842; }
  .season-summer.current .month-cell-fill { background: #f5c842; }
  .season-autumn .month-cell-bg,
  .season-autumn.past .month-cell-fill  { background: #e87842; }
  .season-autumn.current .month-cell-fill { background: #e87842; }

  /* 일 바 */
  #day-bar-wrap {
    display: flex;
    align-items: center;
    gap: 5px;
    min-width: 140px;
  }
  #day-bar-label { font-size: 10px; color: #445; white-space: nowrap; }
  #day-bar-bg {
    flex: 1;
    height: 8px;
    background: #0a1020;
    border-radius: 4px;
    border: 1px solid #1a3050;
    overflow: hidden;
    min-width: 70px;
  }
  #day-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, #e94560, #f5a623);
    transition: width 0.35s ease;
    box-shadow: 0 0 6px rgba(245,166,35,0.5);
  }
  #day-bar-text {
    font-size: 10px;
    color: #f5a623;
    min-width: 36px;
    text-align: right;
  }
  /* 년도 표시 */
  #year-badge {
    font-size: 11px;
    color: #778;
    white-space: nowrap;
    padding: 0 6px;
  }

  /* ── M04/M05 관계도 & 캐릭터 ── */
  .rel-bar-wrap { display:flex; align-items:center; gap:6px; padding:3px 0; }
  .rel-label { font-size:11px; color:#8090a0; min-width:90px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rel-bar-bg { flex:1; height:6px; background:#0a1020; border-radius:3px; overflow:hidden; border:1px solid #1a2a40; }
  .rel-bar-fill { height:100%; border-radius:3px; transition:width 0.5s; }
  .rel-value { font-size:10px; min-width:32px; text-align:right; font-weight:bold; }

  .char-card {
    background:#0f2040; border:1px solid #1a3a60; border-radius:6px;
    padding:9px 11px; margin-bottom:8px;
  }
  .char-card-top { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .char-portrait {
    width:36px; height:36px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; flex-shrink:0; border:2px solid;
  }
  .char-main { flex:1; min-width:0; }
  .char-name { font-weight:bold; font-size:13px; }
  .char-role { font-size:10px; color:#6080a0; margin-top:1px; }
  .char-age  { font-size:10px; color:#5070a0; }
  .char-stats { display:flex; gap:6px; flex-wrap:wrap; margin-top:5px; }
  .stat-chip {
    padding:2px 7px; border-radius:8px; font-size:10px; font-weight:bold;
    background:#0a1830; border:1px solid #1a3050;
  }
  .stat-chip span { color:#f5a623; }
  .trait-list { display:flex; flex-wrap:wrap; gap:3px; margin-top:5px; }
  .trait-badge {
    padding:2px 7px; border-radius:10px; font-size:10px;
    background:#1a2a40; color:#90b0d0; border:1px solid #2a4a60;
  }
  .trait-badge.positive { background:#1a2a1a; color:#6ecf8a; border-color:#2a4a2a; }
  .trait-badge.negative { background:#2a1a1a; color:#cf6e6e; border-color:#4a2a2a; }

  /* 알림 피드 */
  #notif-feed {
    position:absolute; bottom:8px; right:8px;
    display:flex; flex-direction:column-reverse; gap:4px;
    z-index:10; pointer-events:none; max-width:280px;
  }
  .notif-item {
    background:rgba(15,30,60,0.92); border:1px solid #1a4a7a;
    border-radius:5px; padding:5px 10px; font-size:11px; color:#c0d0e0;
    animation: notifIn 0.3s ease, notifOut 0.5s ease 4.5s forwards;
    border-left:3px solid #4a8aff;
    line-height:1.4;
  }
  .notif-item.warn  { border-left-color:#f5a623; }
  .notif-item.alert { border-left-color:#e94560; }
  .notif-item.good  { border-left-color:#4ecf8a; }
  @keyframes notifIn  { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:none} }
  @keyframes notifOut { to{opacity:0;height:0;padding:0;margin:0;} }

  /* 세력 패널 탭 */
  .panel-tab-row { display:flex; gap:3px; margin-bottom:10px; }
  .panel-tab {
    flex:1; text-align:center; padding:4px 0; font-size:11px;
    background:#0a1825; border:1px solid #1a3050; border-radius:3px;
    cursor:pointer; color:#5070a0; transition:all 0.12s;
  }
  .panel-tab:hover { color:#a0c0e0; background:#0f2035; }
  .panel-tab.active { background:#1a3a60; color:#fff; border-color:#3a6aaa; }

  /* 스크롤바 전역 */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: #0f1a2e; }
  ::-webkit-scrollbar-thumb { background: #1a3a60; }

  /* ── 원클릭 시작 버튼 ── */
  #oneclick-start-btn {
    background: #1a6b1a;
    border: 2px solid #4caf50;
    color: #ffffff;
    padding: 6px 18px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    font-family: inherit;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  #oneclick-start-btn:hover:not(:disabled) {
    background: #2a8b2a;
    border-color: #5ecf60;
    box-shadow: 0 0 12px rgba(76,175,80,0.4);
  }
  #oneclick-start-btn:disabled { cursor: default; opacity: 0.65; }

  /* ── 전투 오버레이 카드 ── */
  .battle-card {
    position: absolute;
    background: rgba(10, 15, 30, 0.93);
    border: 2px solid #e94560;
    border-radius: 8px;
    padding: 8px 10px;
    min-width: 200px;
    max-width: 240px;
    cursor: pointer;
    z-index: 15;
    transition: transform 0.1s, box-shadow 0.1s;
    animation: battlePulse 2s ease-in-out infinite;
    pointer-events: all;
    user-select: none;
  }
  .battle-card:hover {
    transform: scale(1.04);
    box-shadow: 0 0 18px rgba(233,69,96,0.5);
    z-index: 20;
  }
  .battle-card.siege {
    border-color: #f5a623;
    animation: siegePulse 2.5s ease-in-out infinite;
  }
  .battle-card-title {
    font-size: 11px;
    font-weight: bold;
    color: #f5a623;
    margin-bottom: 5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .battle-card-title .battle-day {
    font-size: 9px;
    color: #6a8aaa;
  }
  .battle-vs-row {
    display: flex;
    align-items: center;
    gap: 3px;
    margin-bottom: 4px;
  }
  .battle-bar {
    height: 14px;
    border-radius: 2px;
    transition: width 0.5s ease;
    min-width: 4px;
  }
  .battle-bar.attacker { background: linear-gradient(90deg,#e94560,#c43050); border-radius: 3px 0 0 3px; }
  .battle-bar.defender { background: linear-gradient(90deg,#2563c7,#1a4aaa); border-radius: 0 3px 3px 0; }
  .battle-vs-center {
    font-size: 9px;
    color: #556;
    flex-shrink: 0;
    font-weight: bold;
  }
  .battle-card-footer {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: #4a6a8a;
    margin-top: 4px;
  }
  .battle-forces {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    margin-bottom: 2px;
  }
  .battle-forces .att { font-weight: bold; }
  .battle-forces .def { font-weight: bold; }
  .siege-bar-bg {
    background: #0a1020;
    border-radius: 3px;
    height: 8px;
    overflow: hidden;
    border: 1px solid #2a3a50;
    margin: 4px 0;
  }
  .siege-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg,#f5a623,#e94560);
    transition: width 0.5s ease;
  }
  @keyframes battlePulse {
    0%,100% { box-shadow: 0 0 8px rgba(233,69,96,0.3); border-color: #e94560; }
    50%      { box-shadow: 0 0 20px rgba(233,69,96,0.7); border-color: #ff6080; }
  }
  @keyframes siegePulse {
    0%,100% { box-shadow: 0 0 8px rgba(245,166,35,0.3); border-color: #f5a623; }
    50%      { box-shadow: 0 0 20px rgba(245,166,35,0.7); border-color: #ffcc44; }
  }
  /* 전투 상세 패널 */
  .battle-detail-section { margin-bottom: 12px; }
  .battle-log-item {
    font-size: 10px;
    color: #6a8aaa;
    padding: 2px 0;
    border-bottom: 1px solid #0f1a2e;
    line-height: 1.5;
  }
  .battle-log-item::before { content: '• '; color: #3a5a7a; }
  .unit-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    padding: 2px 0;
    border-bottom: 1px solid #0f1a2e;
  }
  .unit-row .unit-name { color: #8090a0; }
  .unit-row .unit-att  { color: #e94560; font-weight: bold; text-align: right; }
  .unit-row .unit-def  { color: #5a8ad0; font-weight: bold; text-align: right; }
  .power-compare {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 0;
    margin-top: 4px;
  }
  .power-bar-wrap { flex: 1; }
  .power-bar-bg { height: 10px; background: #0a1020; border-radius: 5px; overflow: hidden; border: 1px solid #1a2a40; display:flex; }
  .power-att-fill { height: 100%; background: linear-gradient(90deg,#e94560,#c43050); border-radius: 5px 0 0 5px; }
  .power-def-fill { height: 100%; background: linear-gradient(90deg,#2563c7,#1a4aaa); border-radius: 0 5px 5px 0; }

/* ── 이벤트 팝업 ── */
#event-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
}
#event-popup {
  background: #14203a;
  border: 2px solid #f5a623;
  border-radius: 12px;
  width: 460px;
  max-width: 90vw;
  padding: 0;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(245,166,35,0.3);
}
#event-header {
  background: #0f2a40;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid #1a3a60;
}
#event-icon { font-size: 24px; }
#event-title { font-size: 16px; font-weight: bold; color: #f5a623; flex: 1; }
#event-faction { font-size: 11px; color: #5a8aaa; }
#event-desc {
  padding: 16px 18px;
  font-size: 13px;
  color: #c0d0e0;
  line-height: 1.7;
  background: #0d1828;
}
#event-choices { padding: 12px 18px 16px; display: flex; flex-direction: column; gap: 8px; }
.event-choice-btn {

<script>
"use strict";

/* ════════════════════════════════════════════════════════
   M01 — GAME CORE
   시간흐름, 배속, 일시정지, 이벤트버스, 게임상태
════════════════════════════════════════════════════════ */
const GameCore = (() => {

  // ── 게임 날짜 시스템 ──
  const DAYS_PER_MONTH = [31,28,31,30,31,30,31,31,30,31,30,31];
  const MONTH_NAMES = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  // 1틱 = 하루. 1초(real) = speed × 틱
  const TICK_MS = 1000; // 1배속 기준 하루=1초

  let state = {
    year: 1200, month: 1, day: 1,
    totalDays: 0,
    speed: 1,
    paused: true,
    tick: 0,
  };

  // ── 이벤트 버스 ──
  const listeners = {};
  function on(event, cb) {
    (listeners[event] = listeners[event] || []).push(cb);
  }
  function emit(event, data) {
    (listeners[event] || []).forEach(cb => cb(data));
  }

  // ── 시간 진행 ──
  let lastTime = null;
  let accumMs = 0;

  function advanceDay() {
    state.day++;
    state.totalDays++;
    const maxDay = DAYS_PER_MONTH[state.month - 1];
    if (state.day > maxDay) {
      state.day = 1;
      state.month++;
      emit('newMonth', { year: state.year, month: state.month });
      if (state.month > 12) {
        state.month = 1;
        state.year++;
        emit('newYear', { year: state.year });
      }
    }
    emit('tick', { ...state });
    updateDateUI();
  }

  function update(timestamp) {
    requestAnimationFrame(update);
    if (!lastTime) { lastTime = timestamp; return; }
    const dt = timestamp - lastTime;
    lastTime = timestamp;

    if (!state.paused) {
      accumMs += dt * state.speed;
      while (accumMs >= TICK_MS) {
        accumMs -= TICK_MS;
        advanceDay();
      }
    }

    // 맵 렌더
    if (typeof MapRenderer !== 'undefined') MapRenderer.render();
  }

  function updateDateUI() {
    const txt = `${state.year}년 ${MONTH_NAMES[state.month-1]} ${state.day}일`;
    document.getElementById('date-display').textContent = txt;
    document.getElementById('status-date').textContent =
      `${state.year}.${String(state.month).padStart(2,'0')}.${String(state.day).padStart(2,'0')}`;
    document.getElementById('status-speed').textContent =
      state.paused ? '⏸ 일시정지' : `▶ 배속: ${state.speed}×`;
  }

  function togglePause() {
    state.paused = !state.paused;
    const btn = document.getElementById('pause-btn');
    btn.textContent = state.paused ? '▶' : '⏸';
    btn.classList.toggle('paused', state.paused);
    updateDateUI();
    emit('pauseChange', state.paused);
  }

  function setSpeed(s) {
    state.speed = s;
    document.querySelectorAll('.speed-btn').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.speed) === s);
    });
    updateDateUI();
  }

  function getState() { return { ...state }; }

  function start() {
    requestAnimationFrame(update);
    // 키보드 단축키
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') { e.preventDefault(); togglePause(); }
      if (e.key === '1') setSpeed(1);
      if (e.key === '2') setSpeed(2);
      if (e.key === '3') setSpeed(3);
      if (e.key === '5') setSpeed(5);
      if (e.key === 'f' || e.key === 'F') UI.showFactionPanel();
    });
  }

  return { start, togglePause, setSpeed, getState, on, emit };
})();

/* ════════════════════════════════════════════════════════
   M02 — MAP RENDERER
   캔버스 렌더링, 색상 피킹, 클릭 감지, 맵 모드
════════════════════════════════════════════════════════ */
const MapRenderer = (() => {

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const tooltip = document.getElementById('map-tooltip');

  // 오프스크린 피킹 캔버스
  const pickCanvas = document.createElement('canvas');
  const pickCtx = pickCanvas.getContext('2d', { willReadFrequently: true });

  let currentMode = 'political';
  let selectedId = null;
  let hoveredId = null;
  let needsRedraw = true;

  // 맵 스케일/오프셋 (패닝 확장 가능)
  let scale = 1.0;
  let offsetX = 30;
  let offsetY = 20;

  // 인구 최대값 (색상 스케일용)
  const maxPop = Math.max(...ProvinceManager.getAll().map(p => p.population));

  function resize() {
    const wrap = document.getElementById('canvas-wrap');
    canvas.width = wrap.clientWidth;
    canvas.height = wrap.clientHeight;
    pickCanvas.width = canvas.width;
    pickCanvas.height = canvas.height;
    needsRedraw = true;
    buildPickBuffer();
  }

  // ── 폴리곤 변환 ──
  function transformedPoly(poly) {
    return poly.map(([x, y]) => [x * scale + offsetX, y * scale + offsetY]);
  }

  // ── 폴리곤 그리기 헬퍼 ──
  function drawPoly(context, poly, fill, stroke, lineWidth = 1) {
    context.beginPath();
    const tp = transformedPoly(poly);
    context.moveTo(tp[0][0], tp[0][1]);
    for (let i = 1; i < tp.length; i++) context.lineTo(tp[i][0], tp[i][1]);
    context.closePath();
    if (fill) { context.fillStyle = fill; context.fill(); }
    if (stroke) {
      context.strokeStyle = stroke;
      context.lineWidth = lineWidth;
      context.stroke();
    }
  }

  // ── 폴리곤 중심점 ──
  function polyCenter(poly) {
    let x = 0, y = 0;
    poly.forEach(([px, py]) => { x += px; y += py; });
    return [x / poly.length * scale + offsetX, y / poly.length * scale + offsetY];
  }

  // ── 피킹 버퍼 구축 ──
  function buildPickBuffer() {
    pickCtx.clearRect(0, 0, pickCanvas.width, pickCanvas.height);
    ProvinceManager.getAll().forEach(p => {
      drawPoly(pickCtx, p.poly, p.pickColor, null);
    });
  }

  // ── 맵 모드별 색상 계산 ──
  function getProvinceColor(p) {
    switch (currentMode) {
      case 'political': {
        const f = ProvinceManager.getFaction(p.faction);
        return f ? f.color : '#445566';
      }
      case 'terrain': {
        const t = ProvinceManager.getTerrain(p.terrain);
        return t ? t.color : '#888';
      }
      case 'population': {
        const ratio = p.population / maxPop;
        const r = Math.round(255 * ratio);
        const b = Math.round(255 * (1 - ratio));
        return `rgb(${r},60,${b})`;
      }
      case 'resources': {
        const dev = p.development;
        const g = Math.min(255, 80 + dev * 22);
        return `rgb(20,${g},40)`;
      }
      default: return '#445566';
    }
  }

  // ── 메인 렌더 ──
  function render() {
    // 전투 진행 중이면 항상 리렌더 (펄싱 애니메이션)
    if (typeof BattleManager !== 'undefined' && BattleManager.getAll().length > 0) {
      needsRedraw = true;
    }
    if (!needsRedraw) return;
    needsRedraw = false;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 배경 (바다)
    ctx.fillStyle = '#1a3a5c';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 바다 패턴
    ctx.fillStyle = 'rgba(255,255,255,0.02)';
    for (let x = 0; x < canvas.width; x += 40) {
      for (let y = 0; y < canvas.height; y += 40) {
        ctx.fillRect(x, y, 20, 1);
      }
    }

    const provinces = ProvinceManager.getAll();

    // 1단계: 프로빈스 채우기
    provinces.forEach(p => {
      const baseColor = getProvinceColor(p);
      let fillColor = baseColor;

      if (p.id === selectedId) {
        // 선택된 프로빈스: 밝게
        fillColor = lightenColor(baseColor, 40);
      } else if (p.id === hoveredId) {
        fillColor = lightenColor(baseColor, 20);
      }

      drawPoly(ctx, p.poly, fillColor, null);
    });

    // 2단계: 테두리
    provinces.forEach(p => {
      const isSelected = p.id === selectedId;
      const strokeColor = isSelected ? '#fff' : 'rgba(0,0,0,0.6)';
      const lineW = isSelected ? 2.5 : 0.8;
      drawPoly(ctx, p.poly, null, strokeColor, lineW);
    });

    // 3단계: 선택 하이라이트 (점선 외곽)
    if (selectedId) {
      const p = ProvinceManager.getById(selectedId);
      if (p) {
        ctx.save();
        ctx.setLineDash([6, 4]);
        drawPoly(ctx, p.poly, null, '#ffdd44', 2);
        ctx.setLineDash([]);
        ctx.restore();
      }
    }

    // 4단계: 레이블
    provinces.forEach(p => {
      const [cx, cy] = polyCenter(p.poly);
      // 화면 안에 있을 때만
      if (cx < 0 || cx > canvas.width || cy < 0 || cy > canvas.height) return;

      ctx.save();
      ctx.font = `bold ${Math.max(9, 11 * scale)}px 'Malgun Gothic', sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // 그림자
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillText(p.name, cx + 1, cy + 1);

      // 텍스트
      ctx.fillStyle = p.id === selectedId ? '#ffdd44' : '#ffffff';
      ctx.fillText(p.name, cx, cy);

      // 개발도 점
      if (scale > 0.8) {
        const devStr = '●'.repeat(Math.min(p.development, 8));
        ctx.font = `${Math.max(7, 8 * scale)}px serif`;
        ctx.fillStyle = '#ffcc44';
        ctx.fillText(devStr, cx, cy + 12 * scale);
      }
      ctx.restore();
    });

    // 5단계: 세력 영역 레이블 (정치 모드)
    if (currentMode === 'political' && scale > 0.8) {
      // 세력별 중심 프로빈스에 세력명 표시
    }

    // 5.5단계: 사단 배지
    if (typeof MilitaryManager !== 'undefined') {
      provinces.forEach(p => {
        const divsHere = MilitaryManager.getDivisionsAt(p.id);
        if (divsHere.length === 0) return;
        const [cx, cy] = polyCenter(p.poly);
        if (cx < 0 || cx > canvas.width || cy < 0 || cy > canvas.height) return;
        const hasMoving = divsHere.some(d => d.state === 'moving');
        const badgeY = cy + (scale > 0.8 ? 22 : 16) * scale;
        ctx.save();
        ctx.fillStyle = 'rgba(20,10,10,0.8)';
        ctx.fillRect(cx - 13, badgeY - 7, 26, 14);
        ctx.font = `bold ${Math.max(8, 9 * scale)}px 'Malgun Gothic', sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = hasMoving ? '#f5a623' : '#e94560';
        ctx.fillText(`\u2694${divsHere.length}`, cx, badgeY);
        ctx.restore();
      });
    }

    // 6단계: 탐라 섬 연결 힌트 선
    ctx.save();
    ctx.setLineDash([4, 8]);
    ctx.strokeStyle = 'rgba(200,220,255,0.2)';
    ctx.lineWidth = 1;
    const tamra = ProvinceManager.getById(15);
    const nambae = ProvinceManager.getById(14);
    if (tamra && nambae) {
      const [tx, ty] = polyCenter(tamra.poly);
      const [nx, ny] = polyCenter(nambae.poly);
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(nx, ny);
      ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.restore();

    // 맵 모드 워터마크
    ctx.save();
    ctx.font = '11px Malgun Gothic';
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.textAlign = 'left';
    ctx.fillText(getModeLabel(), 8, canvas.height - 8);
    ctx.restore();

    // 6.5단계: 전투 중인 프로빈스 상태 아이콘
    if (typeof BattleManager !== 'undefined') {
      const activeBattles = BattleManager.getAll();
      activeBattles.forEach(b => {
        const p = ProvinceManager.getById(b.provinceId);
        if (!p) return;
        const [cx, cy] = polyCenter(p.poly);
        if (cx < -20 || cx > canvas.width + 20 || cy < -20 || cy > canvas.height + 20) return;
        const alpha = 0.6 + 0.4 * Math.sin(Date.now() / 400);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.font = `bold ${Math.max(12, 14 * scale)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(b.type === 'siege' ? '🏰' : '⚔', cx, cy + 20 * scale);
        ctx.globalAlpha = 1;
        ctx.restore();
      });
    }

    // 6.75단계: 사단 이동 화살표
    if (typeof MilitaryManager !== 'undefined') {
      const allDivs = MilitaryManager.getAllDivisions();
      allDivs.filter(d => d.state === 'moving' && d.targetId).forEach(div => {
        const src = ProvinceManager.getById(div.locationId);
        const dst = ProvinceManager.getById(div.targetId);
        if (!src || !dst) return;
        const [sx, sy] = polyCenter(src.poly);
        const [ex, ey] = polyCenter(dst.poly);
        const fDef = ProvinceManager.getFaction(div.factionId);
        const fColor = fDef ? fDef.color : '#aaa';
        ctx.save();
        ctx.globalAlpha = 0.55;
        ctx.strokeStyle = fColor;
        ctx.lineWidth = 2 * scale;
        ctx.setLineDash([5 * scale, 4 * scale]);
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(ex, ey);
        ctx.stroke();
        ctx.setLineDash([]);
        // 화살촉
        const angle = Math.atan2(ey - sy, ex - sx);
        const al = 8 * scale;
        ctx.fillStyle = fColor;
        ctx.beginPath();
        ctx.moveTo(ex, ey);
        ctx.lineTo(ex - al * Math.cos(angle - 0.4), ey - al * Math.sin(angle - 0.4));
        ctx.lineTo(ex - al * Math.cos(angle + 0.4), ey - al * Math.sin(angle + 0.4));
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.restore();
      });
    }

    // 배틀 오버레이 카드 위치 업데이트
    if (typeof BattleOverlay !== 'undefined') BattleOverlay.reposition();
  }

  function getModeLabel() {
    const labels = { political:'정치 지도', terrain:'지형 지도', population:'인구 지도', resources:'자원 지도' };
    return labels[currentMode] || '';
  }

  // ── 색상 유틸 ──
  function lightenColor(hex, amount) {
    // hex #rrggbb
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgb(${Math.min(255,r+amount)},${Math.min(255,g+amount)},${Math.min(255,b+amount)})`;
  }

  // ── 픽셀 → 프로빈스 ──
  function provinceAtPixel(x, y) {
    const pixel = pickCtx.getImageData(x, y, 1, 1).data;
    const hex = '#' + [pixel[0],pixel[1],pixel[2]].map(v => v.toString(16).padStart(2,'0')).join('');
    return ProvinceManager.getByPickColor(hex);
  }

  // ── 이벤트 ──
  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const p = provinceAtPixel(e.clientX - rect.left, e.clientY - rect.top);
    if (p) {
      selectedId = p.id;
      document.getElementById('status-selected').textContent = `선택: ${p.name}`;
      UI.showProvince(p);
    } else {
      selectedId = null;
      document.getElementById('status-selected').textContent = '선택: 없음';
      UI.clearProvince();
    }
    needsRedraw = true;
  });

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const p = provinceAtPixel(e.clientX - rect.left, e.clientY - rect.top);
    const newHovered = p ? p.id : null;
    if (newHovered !== hoveredId) {
      hoveredId = newHovered;
      needsRedraw = true;
    }
    if (p) {
      const f = ProvinceManager.getFaction(p.faction);
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX - rect.left + 14) + 'px';
      tooltip.style.top = (e.clientY - rect.top - 10) + 'px';
      tooltip.textContent = `${p.name} — ${f ? f.name : '?'} | ${ProvinceManager.getTerrain(p.terrain).name} | 인구 ${p.population.toLocaleString()}`;
    } else {
      tooltip.style.display = 'none';
    }
  });

  canvas.addEventListener('mouseleave', () => {
    hoveredId = null;
    tooltip.style.display = 'none';
    needsRedraw = true;
  });

  // 마우스 휠 줌
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const newScale = Math.max(0.5, Math.min(3.0, scale * delta));
    // 마우스 위치 기준 줌
    offsetX = mx - (mx - offsetX) * (newScale / scale);
    offsetY = my - (my - offsetY) * (newScale / scale);
    scale = newScale;
    needsRedraw = true;
    buildPickBuffer();
  }, { passive: false });

  // 드래그 패닝
  let dragging = false, dragStartX, dragStartY;
  canvas.addEventListener('mousedown', e => {
    if (e.button === 2) { dragging = true; dragStartX = e.clientX - offsetX; dragStartY = e.clientY - offsetY; }
  });
  canvas.addEventListener('mousemove', e => {
    if (dragging) {
      offsetX = e.clientX - dragStartX;
      offsetY = e.clientY - dragStartY;
      needsRedraw = true;
      buildPickBuffer();
    }
  });
  canvas.addEventListener('mouseup', () => { dragging = false; });
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.map-mode-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
    needsRedraw = true;
  }

  function markDirty() { needsRedraw = true; }

  function init() {
    resize();
    window.addEventListener('resize', () => { resize(); });
    GameCore.on('tick', () => { needsRedraw = true; });
  }

  function getViewState() {
    return { scale: scale, offsetX: offsetX, offsetY: offsetY };
  }

  function panTo(mapX, mapY) {
    const canvas = document.getElementById('gameCanvas');
    if (!canvas) return;
    offsetX = canvas.width  / 2 - mapX * scale;
    offsetY = canvas.height / 2 - mapY * scale;
    markDirty();
  }

  return { render, setMode, markDirty, init, polyCenter, getViewState, panTo };
})();

  function hideAll() {
    document.getElementById('empty-hint').style.display = 'none';
    document.getElementById('province-panel').style.display = 'none';
    document.getElementById('faction-panel').style.display = 'none';
    const bp = document.getElementById('battle-panel');
    if (bp) bp.style.display = 'none';
  }
  function showEmpty() {
    setHeader('🗺','프로빈스를 클릭하세요');
    document.getElementById('empty-hint').style.display = 'block';
    document.getElementById('province-panel').style.display = 'none';
    document.getElementById('faction-panel').style.display = 'none';
  }

  // ── 캐릭터 카드 HTML ──
  function charCardHTML(char) {
    if (!char) return '<div style="color:#445;font-size:11px;padding:4px">—</div>';
    const stats = CharacterManager.getEffectiveStats(char);
    const roleLabel = { ruler:'군주', heir:'후계자', general:'장군', advisor:'참모', consort:'배우자' };
    const portraits = { ruler:'👑', heir:'🎖', general:'⚔', advisor:'📜', consort:'💒' };
    const fDef = ProvinceManager.getFaction(char.faction);
    const borderColor = fDef ? fDef.color : '#334';

    const traitsHTML = char.traits.map(t => {
      const def = CharacterManager.getTrait(t);
      const cls = def ? `trait-badge ${def.type}` : 'trait-badge';
      return `<span class="${cls}" title="${def?.desc||''}">${def?.icon||''} ${t}</span>`;
    }).join('');

    const statsHTML = Object.keys(STAT_ICONS).map(k =>
      `<span class="stat-chip" title="${STAT_KO[k]}">${STAT_ICONS[k]}<span>${stats[k]||0}</span></span>`
    ).join('');

    const spouseChar = char.married_to ? CharacterManager.getById(char.married_to) : null;
    const spouseLine = spouseChar
      ? `<div style="font-size:10px;color:#5a7a9a;margin-top:3px">💒 ${spouseChar.name}</div>` : '';

    return `
      <div class="char-card">
        <div class="char-card-top">
          <div class="char-portrait" style="border-color:${borderColor};background:${borderColor}22">
            ${portraits[char.role]||'👤'}
          </div>
          <div class="char-main">
            <div class="char-name">${char.name}</div>
            <div class="char-role">${roleLabel[char.role]||char.role} · ${char.dynasty}</div>
            <div class="char-age">나이 ${char.age}세</div>
            ${spouseLine}
          </div>
        </div>
        <div class="char-stats">${statsHTML}</div>
        <div class="trait-list">${traitsHTML}</div>
      </div>`;
  }

  // ── 관계도 바 ──
  function relBarHTML(factionId, otherId) {
    const val = FactionManager.getRelation(factionId, otherId);
    const lbl = FactionManager.getRelationLabel(val);
    const fDef = ProvinceManager.getFaction(otherId);
    const name = fDef ? fDef.name : otherId;
    const pct = Math.round(((val + 100) / 200) * 100);
    const fillColor = val >= 0 ? '#4ecf8a' : '#e94560';
    return `
      <div class="rel-bar-wrap">
        <span class="rel-label" title="${name}">${name}</span>
        <div class="rel-bar-bg">
          <div class="rel-bar-fill" style="width:${pct}%;background:${fillColor}"></div>
        </div>
        <span class="rel-value" style="color:${lbl.color}">${lbl.text}</span>
      </div>`;
  }

  // ── 프로빈스 패널 ──
  function showProvince(p) {
    const f  = ProvinceManager.getFaction(p.faction);
    const t  = ProvinceManager.getTerrain(p.terrain);

    const fs = FactionManager.getFactionState(p.faction);
    const ruler = CharacterManager.getRuler(p.faction);

    hideAll();
    setHeader(t.icon, p.name);
    const panel = document.getElementById('province-panel');
    panel.style.display = 'block';

    const { income } = FactionManager.calcMonthlyIncome(p.faction);

    panel.innerHTML = `
      <div class="panel-tab-row">
        <div class="panel-tab active" onclick="UI._switchProvTab(this,'prov-basic')">기본</div>
        <div class="panel-tab" onclick="UI._switchProvTab(this,'prov-faction')">세력</div>
        <div class="panel-tab" onclick="UI._switchProvTab(this,'prov-ruler')">군주</div>

      <!-- 기본 정보 탭 -->

          <h4>기본 정보</h4>

            <span class="value"><span class="terrain-badge" style="background:${tc}22;color:${tc};border:1px solid ${tc}44">${t.icon} ${t.name}</span></span></div>
          <div class="info-row"><span class="label">지배 세력</span>
            <span class="value"><span class="faction-dot" style="background:${f?f.color:'#555'}"></span>${f?f.name:'미지'}</span></div>

    ['prov-basic','prov-faction','prov-ruler'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = id === targetId ? 'block' : 'none';
    });
  }

    const defRuler = CharacterManager.getRuler(b.defendFaction);

  return { showProvince, clearProvince, showFactionPanel, showBattleDetail, _switchProvTab };
})();


/* ════════════════════════════════════════════════════════
   TIMEBAR — 타임바 렌더러
   월별 계절 셀 + 일 진행바 + 연도 배지
════════════════════════════════════════════════════════ */
const TimeBar = (() => {
  const DAYS_PER_MONTH = [31,28,31,30,31,30,31,31,30,31,30,31];
  const MONTH_SHORT    = ['1월','2월','3월','4월','5월','6월',
                          '7월','8월','9월','10월','11월','12월'];
  // 계절: 겨울(12,1,2) 봄(3,4,5) 여름(6,7,8) 가을(9,10,11)
  const SEASON = ['winter','winter','spring','spring','spring',
                  'summer','summer','summer','autumn','autumn','autumn','winter'];

  const track    = document.getElementById('month-track');
  const dayFill  = document.getElementById('day-bar-fill');
  const dayText  = document.getElementById('day-bar-text');
  const yearBadge = document.getElementById('year-badge');

  // 셀 12개 미리 생성
  const cells = [];
  for (let i = 0; i < 12; i++) {
    const cell = document.createElement('div');
    cell.className = `month-cell season-${SEASON[i]}`;
    cell.title = MONTH_SHORT[i];
    cell.innerHTML = `
      <div class="month-cell-bg"></div>
      <div class="month-cell-fill"></div>
      <div class="month-cell-label">${MONTH_SHORT[i]}</div>
    `;
    track.appendChild(cell);
    cells.push(cell);
  }

  function update(state) {
    const { year, month, day } = state;
    yearBadge.textContent = `${year}년`;

    for (let i = 0; i < 12; i++) {
      const m = i + 1; // 1~12
      const cell = cells[i];
      const fill = cell.querySelector('.month-cell-fill');

      cell.classList.remove('past', 'current', 'future');

      if (m < month) {
        // 지난 달: 100% 채움
        cell.classList.add('past');
        fill.style.width = '100%';
        fill.style.opacity = '0.6';
        fill.style.animation = 'none';
        fill.style.background = '';
      } else if (m === month) {
        // 현재 달: day/days % 채움
        const days = DAYS_PER_MONTH[i];
        const pct  = Math.round((day / days) * 100);
        cell.classList.add('current');
        fill.style.width = pct + '%';
        fill.style.opacity = '1';
        // 현재 달은 CSS animation이 적용됨 (shimmer)
        fill.style.animation = '';
        fill.style.background = '';
      } else {
        // 미래 달: 0%
        cell.classList.add('future');
        fill.style.width = '0%';
        fill.style.opacity = '0';
        fill.style.animation = 'none';
      }
    }

    // 일 진행바
    const maxDay = DAYS_PER_MONTH[month - 1];
    const pct    = Math.max(3, Math.round((day / maxDay) * 100));
    dayFill.style.width = pct + '%';
    dayText.textContent = `${day}/${maxDay}`;
  }

  return { update };
})();


/* ════════════════════════════════════════════════════════
   M04 — FACTION MANAGER
   세력 자원(금/위신/안정도), 관계도, 영향권, 월별 틱
════════════════════════════════════════════════════════ */
const FactionManager = (() => {

  // ── 세력별 초기 자원 ──
  const FACTION_STATE = {
    "고려":    { gold:850, prestige:72, stability:68, income:0, expenses:0 },
    "북방부족":{ gold:320, prestige:58, stability:55, income:0, expenses:0 },
    "서방상인":{ gold:1100,prestige:65, stability:70, income:0, expenses:0 },
    "동방호족":{ gold:430, prestige:50, stability:60, income:0, expenses:0 },
    "남방":    { gold:560, prestige:55, stability:62, income:0, expenses:0 },
  };

  // ── 초기 관계도 ── (-100 ~ +100)
  // 양쪽 다 설정 불필요, getRelation()이 대칭으로 처리
  const RELATIONS = {
    "고려|북방부족":  -35,
    "고려|서방상인":   20,
    "고려|동방호족":   10,
    "고려|남방":       30,
    "북방부족|서방상인":-10,
    "북방부족|동방호족": 5,
    "북방부족|남방":   -20,
    "서방상인|동방호족": 15,
    "서방상인|남방":    25,
    "동방호족|남방":    10,
  };

  // ── 관계도 접근 ──
  function relKey(a, b) {
    return [a, b].sort().join('|');
  }
  function getRelation(a, b) {
    return RELATIONS[relKey(a, b)] ?? 0;
  }
  function modRelation(a, b, delta) {
    const k = relKey(a, b);
    RELATIONS[k] = Math.max(-100, Math.min(100, (RELATIONS[k] ?? 0) + delta));
  }
  function getRelationLabel(val) {
    if (val >=  60) return { text:'동맹',   color:'#4ecf8a' };
    if (val >=  25) return { text:'우호',   color:'#8bc34a' };
    if (val >=  -10) return { text:'중립',  color:'#90a0b0' };
    if (val >= -40) return { text:'경계',   color:'#f5a623' };
    return               { text:'적대',     color:'#e94560' };
  }

  // ── 월 수입 계산 ──
  const BASE_INCOME_PER_DEV = 8;   // 개발도 1당 금/월
  const EXPENSE_PER_PROVINCE = 12; // 프로빈스 유지비

  function calcMonthlyIncome(factionId) {
    const provs = ProvinceManager.getFactionProvinces(factionId);
    let income = 0;
    provs.forEach(p => {
      const t = ProvinceManager.getTerrain(p.terrain);
      income += p.development * BASE_INCOME_PER_DEV * t.taxMod;
      // 건물 보너스
      if (p.buildings.includes('시장'))    income += 20;
      if (p.buildings.includes('교역소'))  income += 15;
      if (p.buildings.includes('항구'))    income += 18;
      if (p.buildings.includes('창고'))    income += 10;
    });
    const expenses = provs.length * EXPENSE_PER_PROVINCE;
    return { income: Math.round(income), expenses };
  }

  function onMonthTick() {
    const factions = ProvinceManager.getFactions();
    Object.keys(FACTION_STATE).forEach(fid => {
      if (!factions[fid]) return;
      const s = FACTION_STATE[fid];
      const { income, expenses } = calcMonthlyIncome(fid);
      s.income   = income;
      s.expenses = expenses;
      s.gold     = Math.round(s.gold + income - expenses);
      // 안정도 영향: 적자면 하락
      if (income < expenses) s.stability = Math.max(0, s.stability - 0.5);
      else s.stability = Math.min(100, s.stability + 0.2);
      // 위신: 점진 회복
      s.prestige = Math.min(100, s.prestige + 0.1);
    });
    // 관계도 자연 드리프트 (중립으로)
    Object.keys(RELATIONS).forEach(k => {
      RELATIONS[k] = RELATIONS[k] > 0
        ? Math.max(0, RELATIONS[k] - 0.3)
        : Math.min(0, RELATIONS[k] + 0.2);
    });
    refreshStatusBar();
  }

  function getFactionState(id) {
    return FACTION_STATE[id] ? { ...FACTION_STATE[id] } : null;
  }

  function getAllFactionStates() { return FACTION_STATE; }

  function refreshStatusBar() {
    // 관찰자 모드 — 고려 기준 표시
    const s = FACTION_STATE['고려'];
    if (!s) return;
    document.getElementById('status-faction-res').textContent =
      `고려: 💰${s.gold.toLocaleString()}  위신${s.prestige.toFixed(0)}  안정${s.stability.toFixed(0)}`;
  }

  function addGold(factionId, amount) {
    const s = FACTION_STATE[factionId];
    if (s) s.gold = Math.max(0, (s.gold || 0) + amount);
  }

  return {
    getRelation, modRelation, getRelationLabel,
    getFactionState, getAllFactionStates,
    calcMonthlyIncome, onMonthTick, addGold,
  };
})();


/* ════════════════════════════════════════════════════════

const CharacterManager = (() => {

  // ── 초기 캐릭터 로스터 ──
  let characters = [
    // 고려
    { id:1,  name:'왕 건 2세',   faction:'고려',     role:'ruler', age:42, dynasty:'왕씨',
      traits:['현명한','외교관'], stats:{martial:8,diplomacy:14,stewardship:11,intrigue:6}, married_to:2 },
    { id:2,  name:'왕비 류씨',   faction:'고려',     role:'consort',age:36, dynasty:'류씨',
      traits:['인자한'],          stats:{martial:3,diplomacy:10,stewardship:8,intrigue:5},  married_to:1 },
    { id:3,  name:'왕자 왕성',   faction:'고려',     role:'heir',  age:18, dynasty:'왕씨',
      traits:['용맹한'],          stats:{martial:11,diplomacy:6,stewardship:7,intrigue:4},  married_to:null },
    { id:4,  name:'대장군 최충', faction:'고려',     role:'general',age:55, dynasty:'최씨',
      traits:['지략가','노련한'], stats:{martial:15,diplomacy:5,stewardship:7,intrigue:8},  married_to:null },

    // 북방부족
    { id:5,  name:'대칸 울루크', faction:'북방부족', role:'ruler', age:38, dynasty:'울씨',
      traits:['용맹한','잔인한'],  stats:{martial:16,diplomacy:4,stewardship:6,intrigue:7},  married_to:null },
    { id:6,  name:'부칸 테무르', faction:'북방부족', role:'heir',  age:20, dynasty:'울씨',
      traits:['용맹한'],           stats:{martial:13,diplomacy:5,stewardship:5,intrigue:4},  married_to:null },

    // 서방상인
    { id:7,  name:'집정관 해리스',faction:'서방상인',role:'ruler', age:51, dynasty:'해씨',
      traits:['탐욕스러운','교활한'], stats:{martial:5,diplomacy:10,stewardship:17,intrigue:14}, married_to:8 },
    { id:8,  name:'부인 마르셀라',faction:'서방상인',role:'consort',age:44, dynasty:'마씨',
      traits:['외교관'],            stats:{martial:2,diplomacy:12,stewardship:9,intrigue:6},   married_to:7 },
    { id:9,  name:'상단장 카림', faction:'서방상인', role:'heir',  age:29, dynasty:'해씨',
      traits:['청렴한'],            stats:{martial:6,diplomacy:8,stewardship:14,intrigue:7},   married_to:null },

    // 동방호족
    { id:10, name:'호족장 김동운',faction:'동방호족',role:'ruler', age:47, dynasty:'김씨',
      traits:['지략가','노련한'],   stats:{martial:12,diplomacy:8,stewardship:9,intrigue:10},  married_to:null },
    { id:11, name:'장남 김무철', faction:'동방호족', role:'heir',  age:23, dynasty:'김씨',
      traits:['용맹한'],            stats:{martial:10,diplomacy:6,stewardship:7,intrigue:5},   married_to:null },

    // 남방
    { id:12, name:'제후 이남해', faction:'남방',     role:'ruler', age:61, dynasty:'이씨',
      traits:['현명한','병약한'],   stats:{martial:6,diplomacy:11,stewardship:13,intrigue:9},  married_to:null },
    { id:13, name:'세자 이대풍', faction:'남방',     role:'heir',  age:32, dynasty:'이씨',
      traits:['인자한','외교관'],   stats:{martial:7,diplomacy:13,stewardship:10,intrigue:6},  married_to:null },
  ];

  let nextCharId = 20;

  // ── 접근자 ──
  function getAll()                { return characters; }
  function getById(id)             { return characters.find(c => c.id === id); }
  function getByFaction(fid)       { return characters.filter(c => c.faction === fid); }
  function getRuler(fid)           { return characters.find(c => c.faction === fid && c.role === 'ruler'); }
  function getHeir(fid)            { return characters.find(c => c.faction === fid && c.role === 'heir'); }
  function getTrait(name)          { return TRAIT_DEFS[name]; }
  function getAllTraits()           { return TRAIT_DEFS; }

  // ── 능력치 합산 (특성 반영) ──
  function getEffectiveStats(char) {
    const s = { ...char.stats };
    char.traits.forEach(t => {
      const def = TRAIT_DEFS[t];
      if (!def) return;
      Object.entries(def.effects).forEach(([k, v]) => { s[k] = (s[k] || 0) + v; });
    });
    return s;
  }

  // ── 연령 진행 (매 게임 연도) ──
  function onYearTick() {
    characters.forEach(c => { c.age++; });
    checkDeaths();
  }

  // ── 사망 체크 ──
  function checkDeaths() {
    const dead = [];
    characters = characters.filter(c => {
      if (c.role === 'ruler' || c.role === 'heir' || c.role === 'general') {
        let deathChance = 0;
        if (c.age >= 75) deathChance = 0.25;
        else if (c.age >= 65) deathChance = 0.10;
        else if (c.age >= 55) deathChance = 0.04;
        else if (c.age >= 45) deathChance = 0.015;
        else deathChance = 0.005;
        if (c.traits.includes('병약한')) deathChance *= 2.5;
        if (Math.random() < deathChance) {
          dead.push(c);
          return false;
        }
      }
      return true;
    });

    dead.forEach(c => {
      if (c.role === 'ruler') {
        Notifications.push(`⚠ ${c.faction}: ${c.name} 붕어 (향년 ${c.age}세)`, 'alert');
        succeedRuler(c.faction);
      } else if (c.role === 'heir') {
        Notifications.push(`⚠ ${c.faction}: 후계자 ${c.name} 사망`, 'warn');
      } else {
        Notifications.push(`${c.faction}: ${c.name} 사망 (${c.age}세)`, '');
      }
    });
  }

  // ── 군주 계승 ──
  function succeedRuler(factionId) {
    const heir = getHeir(factionId);
    if (heir) {
      heir.role = 'ruler';
      Notifications.push(`✓ ${factionId}: ${heir.name} 즉위`, 'good');
      // 새 후계자 자동 생성 (간략)
      const newHeir = generateHeir(factionId, heir);
      characters.push(newHeir);
    } else {
      // 후계자 없음 → 안정도 큰 타격
      const fs = FactionManager.getAllFactionStates()[factionId];

      Notifications.push(`⚠ ${factionId}: 후계자 없음! 안정도 대폭 하락`, 'alert');

      characters.push(newRuler);
